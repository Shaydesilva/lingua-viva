<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#FAF7F2"/>
  <title>Luna v3.1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#FAF7F2;--bg2:#F3EDE4;--card:#FFF;--border:#E8E0D4;--text:#2C2825;--text2:#7A7067;--text3:#A69E94;--accent:#C4654A;--accent-l:#F2DDD6;--pt:#B8860B;--pt-bg:#FDF6E3;--green:#5A8A6A;--green-l:#E8F0EB;--red:#C44A4A}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Source Sans 3',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
    #app{display:flex;flex-direction:column;height:100dvh;max-width:600px;margin:0 auto;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}

    /* Header */
    header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
    .hamburger{width:24px;height:24px;cursor:pointer;display:flex;flex-direction:column;justify-content:center;gap:5px;-webkit-tap-highlight-color:transparent}
    .hamburger span{display:block;height:2px;background:var(--text2);border-radius:1px;transition:all .2s}
    .logo{font-family:'Instrument Serif',serif;font-size:22px;font-style:italic;letter-spacing:-.01em}
    .hdr-right{display:flex;align-items:center;gap:12px}
    .timer{font-size:13px;font-variant-numeric:tabular-nums;color:var(--text3)}.timer.on{color:var(--green)}.timer.warn{color:var(--red);font-weight:600}
    .mode-tog{display:none;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:2px}.mode-tog.show{display:flex}
    .mode-o{padding:4px 11px;border-radius:18px;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}.mode-o.on{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}

    /* Chat — CHANGED: added display:flex;flex-direction:column to .msg */
    #chat{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:14px;-webkit-overflow-scrolling:touch}
    .msg{max-width:88%;animation:fadeUp .2s ease;display:flex;flex-direction:column}.msg.luna{align-self:flex-start}.msg.user{align-self:flex-end;align-items:flex-end}
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .bubble{padding:11px 15px;border-radius:18px;font-size:15px;line-height:1.55;display:flex;flex-wrap:wrap;align-items:baseline}
    .luna .bubble{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px}
    .user .bubble{background:var(--accent);border-bottom-right-radius:4px;color:#fff}

    /* Words */
    .w{display:inline;cursor:pointer;border-radius:3px;padding:0 1px;-webkit-tap-highlight-color:transparent;transition:background .1s}.w:active{background:var(--accent-l)}
    .w.pt{color:var(--pt);font-weight:500;background:var(--pt-bg);padding:0 3px}.w.pt:active{background:#F5E6C8}
    .sp{display:inline;pointer-events:none}
    .w-live{display:inline;color:var(--text3);pointer-events:none}

    /* Status */
    #sbar{flex-shrink:0;padding:10px 20px;display:flex;align-items:center;gap:8px;border-top:1px solid var(--border);min-height:40px}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .2s}
    .dot.listen{background:var(--green);animation:pulse 1.8s ease-in-out infinite}
    .dot.speak{background:var(--accent);animation:pulse .8s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    #stxt{font-size:13px;color:var(--text3)}

    /* Live area */
    #live{flex-shrink:0;min-height:50px;padding:6px 20px 4px;display:flex;flex-wrap:wrap;align-items:baseline;font-size:15px;line-height:1.55}

    /* Controls */
    #ctrl{flex-shrink:0;padding:8px 20px 20px;display:flex;flex-direction:column;align-items:center;gap:8px}
    .btn{width:100%;max-width:340px;padding:15px;border:none;border-radius:14px;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .1s;outline:none}.btn:active{transform:scale(.97)}.btn:disabled{opacity:.4}
    .btn-go{background:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(196,101,74,.25)}
    .btn-stop{background:var(--bg2);border:1px solid var(--border);color:var(--text2)}
    .btn-wait{background:var(--bg2);border:1px solid var(--border);color:var(--text3)}
    .btn-ptt{display:none;width:100%;max-width:340px;padding:13px;border-radius:14px;border:1.5px dashed var(--border);background:transparent;color:var(--text3);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;outline:none;-webkit-tap-highlight-color:transparent}.btn-ptt.show{display:block}.btn-ptt.on{background:var(--green-l);border-color:var(--green);border-style:solid;color:var(--green)}

    /* Tooltip */
    .tip{position:fixed;z-index:999;min-width:140px;max-width:220px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;box-shadow:0 8px 30px rgba(0,0,0,.1);pointer-events:none;animation:tipIn .15s ease}
    @keyframes tipIn{from{opacity:0;transform:translateY(6px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
    .tip-w{font-family:'Instrument Serif',serif;font-size:18px;font-style:italic;color:var(--pt);margin-bottom:4px}
    .tip-d{font-size:14px;color:var(--text);line-height:1.4}
    .tip-n{font-size:12px;color:var(--text3);margin-top:3px}
    .tip-b{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:var(--pt-bg);color:var(--pt);padding:2px 7px;border-radius:10px;margin-bottom:6px}
    .tip-spin{width:14px;height:14px;border:1.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .5s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Slide-out panel */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}.overlay.open{opacity:1;pointer-events:auto}
    .panel{position:fixed;top:0;left:0;bottom:0;width:300px;background:var(--bg);z-index:101;transform:translateX(-100%);transition:transform .3s cubic-bezier(.22,1,.36,1);overflow-y:auto;padding:env(safe-area-inset-top,20px) 20px 40px;-webkit-overflow-scrolling:touch}
    .panel.open{transform:translateX(0)}
    .panel-close{position:absolute;top:16px;right:16px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:20px;-webkit-tap-highlight-color:transparent}
    .panel h2{font-family:'Instrument Serif',serif;font-size:22px;font-style:italic;font-weight:400;margin:24px 0 16px;color:var(--text)}
    .panel h2:first-of-type{margin-top:8px}
    .hero-num{font-size:48px;font-weight:700;color:var(--accent);letter-spacing:-.02em}.hero-label{font-size:13px;color:var(--text3);margin-top:-4px}
    .stat-row{display:flex;gap:16px;margin:12px 0}
    .stat{flex:1}.stat-val{font-size:20px;font-weight:600}.stat-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
    .phase-bar{height:4px;background:var(--bg2);border-radius:2px;margin:8px 0 4px;overflow:hidden}.phase-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}
    .phase-lbl{font-size:12px;color:var(--text3)}

    .vocab-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
    .vocab-item:last-child{border:none}
    .vocab-w{font-weight:500;font-size:14px}.vocab-t{font-size:13px;color:var(--text2)}.vocab-m{width:40px;height:4px;border-radius:2px;background:var(--bg2);overflow:hidden;flex-shrink:0}.vocab-mf{height:100%;border-radius:2px}

    .sess-item{padding:10px 0;border-bottom:1px solid var(--border)}.sess-item:last-child{border:none}
    .sess-date{font-size:12px;color:var(--text3)}.sess-sum{font-size:13px;color:var(--text2);margin-top:2px;line-height:1.4}

    /* Recap card */
    .recap{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);border-radius:16px 16px 0 0;padding:20px 24px calc(env(safe-area-inset-bottom,20px) + 12px);box-shadow:0 -4px 30px rgba(0,0,0,.08);z-index:50;transform:translateY(100%);transition:transform .35s cubic-bezier(.22,1,.36,1);max-width:600px;margin:0 auto}
    .recap.show{transform:translateY(0)}
    .recap-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .recap-title{font-family:'Instrument Serif',serif;font-size:18px;font-style:italic}
    .recap-dur{font-size:13px;color:var(--text3)}
    .recap-words{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
    .recap-tag{font-size:12px;font-weight:500;padding:3px 10px;border-radius:20px}
    .recap-new{background:var(--accent-l);color:var(--accent)}
    .recap-rev{background:var(--green-l);color:var(--green)}
    .recap-sum{font-size:13px;color:var(--text2);line-height:1.4;margin-top:6px}

    /* ADDED: Translate button + text */
    .tl-btn{border:none;background:none;padding:3px 8px;margin-top:2px;font-size:11px;color:var(--text3);cursor:pointer;-webkit-tap-highlight-color:transparent}
    .tl-text{display:none;font-size:13px;color:var(--text2);background:var(--bg2);border-radius:10px;padding:7px 11px;margin-top:3px;line-height:1.4}
    .tl-text.on{display:block;animation:fadeUp .15s ease}

    /* Self-assessment — inline in chat */
    .sa-card{max-width:88%;align-self:center;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 16px;text-align:center;animation:fadeUp .25s ease}
    .sa-prompt{font-size:14px;color:var(--pt);font-weight:600;margin-bottom:2px}
    .sa-trans{font-size:12px;color:var(--text3);margin-bottom:10px}
    .sa-btns{display:flex;gap:10px;justify-content:center}
    .sa-btn{padding:10px 22px;border-radius:12px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border:none;-webkit-tap-highlight-color:transparent;transition:transform .1s}
    .sa-btn:active{transform:scale(.92)}
    .sa-got{background:var(--green-l);color:var(--green)}
    .sa-wip{background:#FFF3E0;color:#E6A817}

    /* Feedback card after assessment */
    .sa-result{max-width:88%;align-self:center;padding:10px 16px;border-radius:12px;text-align:center;font-size:13px;font-weight:600;animation:resultPop .3s ease}
    .sa-result.got{background:var(--green-l);color:var(--green)}
    .sa-result.wip{background:#FFF3E0;color:#E6A817}
    .sa-result .sa-detail{font-size:11px;font-weight:400;margin-top:2px;opacity:.8}
    @keyframes resultPop{0%{opacity:0;transform:scale(.9)}50%{transform:scale(1.03)}100%{opacity:1;transform:scale(1)}}

    /* Confetti burst */
    .confetti{position:fixed;pointer-events:none;z-index:100}
    .confetti-piece{position:absolute;width:6px;height:6px;border-radius:50%;animation:confettiFall .8s ease-out forwards}
    @keyframes confettiFall{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}

    .welcome{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px;line-height:1.6}
    .welcome h2{font-family:'Instrument Serif',serif;font-size:28px;font-style:italic;color:var(--text);margin-bottom:8px;font-weight:400}
    .welcome-link{display:inline-block;margin-top:12px;padding:8px 18px;border:1px solid var(--border);border-radius:10px;font-size:13px;color:var(--text2);text-decoration:none;transition:background .15s}
    .welcome-link:active{background:var(--bg2)}
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="hamburger" onclick="togglePanel()"><span></span><span></span><span></span></div>
    <div class="logo">Luna</div>
    <div class="hdr-right">
      <div class="mode-tog" id="modeTog"><div class="mode-o on" id="mO" onclick="setMode(false)">Open</div><div class="mode-o" id="mP" onclick="setMode(true)">Hold</div></div>
      <div class="timer" id="tmr">0:00</div>
    </div>
  </header>
  <div id="chat"><div class="welcome" id="welc"><h2>Oi</h2><p>Tap below to talk with Luna.<br>She'll chat in English with Portuguese woven in.<br>Tap any word to see what it means.</p><a class="welcome-link" href="/">&#8592; Home</a></div></div>
  <div id="live"></div>
  <div id="sbar"><div class="dot" id="dot"></div><span id="stxt">Ready</span></div>
  <div id="ctrl">
    <button class="btn btn-go" id="mbtn" onclick="go()">Start talking</button>
    <button class="btn-ptt" id="pttBtn" ontouchstart="pttOn(event)" ontouchend="pttOff(event)" onmousedown="pttOn(event)" onmouseup="pttOff(event)">Hold to talk</button>
  </div>
</div>

<!-- Overlay + Panel -->
<div class="overlay" id="overlay" onclick="togglePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-close" onclick="togglePanel()">×</div>
  <h2>Your Portuguese</h2>
  <div id="pnlHero"></div>
  <div id="pnlPhase"></div>
  <div id="pnlStats"></div>
  <h2>Vocabulary</h2>
  <div id="pnlVocab"><div style="color:var(--text3);font-size:13px">Start a conversation to build your vocabulary.</div></div>
  <h2>Recent Sessions</h2>
  <div id="pnlSessions"><div style="color:var(--text3);font-size:13px">No sessions yet.</div></div>
</div>

<!-- Recap card -->
<div class="recap" id="recap"></div>

<audio id="aud" autoplay playsinline></audio>

<script>
const MAX_MINS=30;
const GOODBYE=["that's all","bye","tchau","até mais","talk later","gotta go","see you","good night","boa noite","falou","goodbye","see ya"];
const CONFUSE=["huh","what","what?","huh?","sorry?","que?","sorry","i don't understand","i don't get it","in english","english please","what does that mean","what did you say","i'm lost","i'm confused","come again","what was that"];
const PT_RE=/[ãõâêîôûçáéíóúàü]/i;
const PT_SET=new Set(['tá','né','tô','cê','cara','gente','assim','então','tipo','nossa','oi','tchau','obrigado','obrigada','legal','saudade','carioca','boteco','praia','poxa','caramba','mano','ótimo','beleza','valeu','falou','não','sim','muito','mais','para','com','uma','isso','bom','boa','bem','tudo','que','por','aqui','você','mas','cadê','também','quando','onde','como','porque','pô','firmeza','tranquilo','demais','galera','cerveja','açaí','fome','sede','calor','frio','grande','pequeno','dinheiro','conta','garçom','cardápio','padaria','troco','banheiro','cartão','água','café','gostoso','massa','almoço','jantar']);
function isPt(w){const c=w.toLowerCase().replace(/[.,!?;:'"()""«»—-]/g,'');return c&&(PT_RE.test(c)||PT_SET.has(c))}

let pc=null,dc=null,stream=null,state='idle',lunaT='',wBuf='',wEl=null;
let transcript=[],t0=null,tmrI=null,bye=false,cap=false,ptt=false;
let tcache={},popup=null,reinI=null,vocabMap={};
const $=id=>document.getElementById(id);

function setSt(t,m){$('stxt').textContent=t;$('dot').className='dot'+(m?' '+m:'')}
function setBtn(s){const b=$('mbtn');if(s==='wait'){b.className='btn btn-wait';b.textContent='Connecting…';b.disabled=true}else if(s==='live'){b.className='btn btn-stop';b.textContent='End conversation';b.disabled=false}else{b.className='btn btn-go';b.textContent='Start talking';b.disabled=false}}

// Timer
function startTmr(){t0=Date.now();$('tmr').className='timer on';tmrI=setInterval(()=>{const s=Math.floor((Date.now()-t0)/1000),m=Math.floor(s/60);$('tmr').textContent=`${m}:${String(s%60).padStart(2,'0')}`;if(s>=25*60)$('tmr').className='timer warn';if(s>=MAX_MINS*60&&!cap)triggerCap()},1000)}
function stopTmr(){clearInterval(tmrI);$('tmr').textContent='0:00';$('tmr').className='timer'}
function triggerCap(){cap=true;if(dc?.readyState==='open'){dc.send(JSON.stringify({type:'conversation.item.create',item:{type:'message',role:'system',content:[{type:'input_text',text:'We have been talking '+MAX_MINS+' minutes. Wrap up the conversation warmly.'}]}}));dc.send(JSON.stringify({type:'response.create'}));bye=true}}

// Words
function mkW(t){const c=t.replace(/^[""'«(]+|[.,!?;:""'»)—-]+$/g,'');const e=document.createElement('span');e.className='w'+(c&&isPt(c)?' pt':'');e.textContent=t;if(c){e.dataset.word=c;e.addEventListener('click',ev=>{ev.stopPropagation();showTip(c,e)})}return e}
function mkSp(){const e=document.createElement('span');e.className='sp';e.textContent=' ';return e}
function fillWords(el,txt){txt.split(/(\s+)/).forEach(t=>{if(/^\s+$/.test(t))el.appendChild(mkSp());else if(t)el.appendChild(mkW(t))})}

// Live stream
function onD(d){if(!lunaT)$('live').innerHTML='';lunaT+=d;for(const ch of d){if(ch===' '||ch==='\n'){if(wBuf){if(wEl){wEl.remove();wEl=null}$('live').appendChild(mkW(wBuf));wBuf=''}$('live').appendChild(mkSp())}else{wBuf+=ch;if(!wEl){wEl=document.createElement('span');wEl.className='w-live';$('live').appendChild(wEl)}wEl.textContent=wBuf}}}
function onDone(){if(wBuf){if(wEl){wEl.remove();wEl=null}$('live').appendChild(mkW(wBuf));wBuf=''}if(wEl){wEl.remove();wEl=null}const t=lunaT.trim();if(t){transcript.push({role:'assistant',text:t});addMsg('luna',t);lastLunaPtWords=extractPtWords(t)}lunaT='';$('live').innerHTML=''}

// CHANGED: addMsg now includes translate button
function addMsg(r,t){const w=$('welc');if(w)w.remove();const m=document.createElement('div');m.className='msg '+r;const b=document.createElement('div');b.className='bubble';if(r==='luna')fillWords(b,t);else b.textContent=t;m.appendChild(b);const tlT=document.createElement('div');tlT.className='tl-text';const tlB=document.createElement('button');tlB.className='tl-btn';tlB.textContent=r==='luna'?'Translate':'Em português';tlB.onclick=()=>{if(tlT.classList.contains('on')){tlT.classList.remove('on');return}tlT.className='tl-text on';tlT.textContent='Translating…';fetch('/translate-message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t})}).then(res=>res.json()).then(d=>{tlT.textContent=d.translation||'—'}).catch(()=>{tlT.textContent='—'})};m.appendChild(tlB);m.appendChild(tlT);$('chat').appendChild(m);$('chat').scrollTop=$('chat').scrollHeight}

// Tooltip
async function showTip(w,a){if(popup){popup.remove();popup=null}const tt=document.createElement('div');tt.className='tip';tt.innerHTML=`<div class="tip-w">${w}</div><div class="tip-spin"></div>`;document.body.appendChild(tt);popup=tt;posTip(tt,a);const k=w.toLowerCase();if(!tcache[k]){try{const r=await fetch('/translate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({word:w})});tcache[k]=await r.json()}catch{tcache[k]={translation:'—',language:'unknown'}}}if(tt!==popup)return;const d=tcache[k];let h='';if(d.language==='pt')h+='<div class="tip-b">Portuguese</div>';h+=`<div class="tip-w">${w}</div><div class="tip-d">${d.translation||'—'}</div>`;if(d.note)h+=`<div class="tip-n">${d.note}</div>`;tt.innerHTML=h;setTimeout(()=>{if(tt===popup){tt.remove();popup=null}},4000)}
function posTip(el,a){const r=a.getBoundingClientRect();let t=r.top-90;if(t<10)t=r.bottom+8;let l=r.left+r.width/2-110;l=Math.max(8,Math.min(l,innerWidth-228));Object.assign(el.style,{top:t+'px',left:l+'px',width:'220px'})}
document.addEventListener('click',()=>{if(popup){popup.remove();popup=null}});

// PTT
function setMode(p){ptt=p;$('mO').className='mode-o'+(!p?' on':'');$('mP').className='mode-o'+(p?' on':'');$('pttBtn').className='btn-ptt'+(p?' show':'');if(stream)stream.getAudioTracks().forEach(t=>{t.enabled=!p})}
function pttOn(e){e.preventDefault();if(!ptt||!stream)return;stream.getAudioTracks().forEach(t=>{t.enabled=true});$('pttBtn').classList.add('on')}
function pttOff(e){e.preventDefault();if(!ptt||!stream)return;stream.getAudioTracks().forEach(t=>{t.enabled=false});$('pttBtn').classList.remove('on')}

// Reinforcement
function startRein(){reinI=setInterval(()=>{if(dc?.readyState==='open')dc.send(JSON.stringify({type:'conversation.item.create',item:{type:'message',role:'system',content:[{type:'input_text',text:'Stay in English. Portuguese only 1-2 words per response, translated. Short responses.'}]}}))},60000)}

// Context triggers
const CTX_MAP={'restaurant|food|eat|hungry|dinner|lunch|breakfast':['conta','garçom','cardápio','fome','gostoso','almoço','jantar'],'beach|surf|copacabana|ipanema|sand|ocean|swim':['praia','calor','sol'],'money|pay|expensive|cheap|buy|price':['dinheiro','caro','barato','cartão','troco','quanto custa'],'drink|beer|bar|coffee|water|thirsty':['cerveja','café','água','sede','boteco'],'tired|sleep|hot|cold|weather':['cansado','calor','frio','chuva','sol']};
function checkCtx(txt){const lo=txt.toLowerCase();for(const[kw,words]of Object.entries(CTX_MAP)){if(kw.split('|').some(k=>lo.includes(k))){const rev=words.filter(w=>vocabMap[w]&&vocabMap[w]<90);if(rev.length&&dc?.readyState==='open'){dc.send(JSON.stringify({type:'conversation.item.create',item:{type:'message',role:'system',content:[{type:'input_text',text:`He's talking about ${kw.split('|')[0]}. Words you've used before: ${rev.join(', ')}. Work them in.`}]}}));return}}}}

// Self-assessment — inline in chat feed
let lastLunaPtWords=[],saActiveWord=null,saActiveEl=null,saTimer=null;

function extractPtWords(text){
  return text.split(/\s+/).map(w=>w.toLowerCase().replace(/[.,!?;:'"()—-]/g,'')).filter(w=>w&&isPt(w));
}

// Sound synthesis via Web Audio API
let audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}
function playTone(freq,dur,type,vol){
  try{const a=getAudio(),o=a.createOscillator(),g=a.createGain();o.type=type||'sine';o.frequency.value=freq;g.gain.value=vol||0.15;g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+dur)}catch(e){}
}
function sndGot(){playTone(523,.1,'sine',.12);setTimeout(()=>playTone(659,.15,'sine',.12),100)}
function sndWip(){playTone(392,.2,'sine',.08)}
function sndClick(){playTone(800,.04,'square',.05)}
function sndComplete(){playTone(523,.12,'sine',.1);setTimeout(()=>playTone(659,.12,'sine',.1),120);setTimeout(()=>playTone(784,.2,'sine',.1),240)}

// Haptics
function haptic(style){try{if(navigator.vibrate){navigator.vibrate(style==='heavy'?[30]:style==='light'?[10]:[15])}}catch(e){}}

// Confetti burst
function confetti(x,y,color){
  const c=document.createElement('div');c.className='confetti';c.style.left=x+'px';c.style.top=y+'px';
  const colors=color==='green'?['#5A8A6A','#7BC47F','#A8E6A1','#E8F0EB']:['#E6A817','#F5D76E','#FFE8A0','#FFF3E0'];
  for(let i=0;i<8;i++){const p=document.createElement('div');p.className='confetti-piece';const angle=Math.random()*Math.PI*2;const dist=30+Math.random()*40;p.style.setProperty('--dx',Math.cos(angle)*dist+'px');p.style.setProperty('--dy',Math.sin(angle)*dist+'px');p.style.background=colors[i%colors.length];p.style.left=Math.random()*10-5+'px';p.style.top=Math.random()*10-5+'px';c.appendChild(p)}
  document.body.appendChild(c);setTimeout(()=>c.remove(),900);
}

function checkSelfAssess(userText){
  if(!lastLunaPtWords.length)return;
  const userWords=userText.toLowerCase().split(/\s+/).map(w=>w.replace(/[.,!?;:'"()—-]/g,''));
  for(const pw of lastLunaPtWords){
    const matched=userWords.some(uw=>{
      if(uw===pw)return true;
      if(pw.length<4)return false;
      if(Math.abs(uw.length-pw.length)>2)return false;
      let diff=0;for(let i=0;i<Math.min(uw.length,pw.length);i++){if(uw[i]!==pw[i])diff++}
      return diff<=2;
    });
    if(matched){
      showInlineAssess(pw);
      return;
    }
  }
}

function showInlineAssess(word){
  // Remove any existing assessment card
  if(saActiveEl){saActiveEl.remove();saActiveEl=null}
  clearTimeout(saTimer);

  saActiveWord=word;

  // Look up translation from cache or vocab
  const cached=tcache[word.toLowerCase()];
  const trans=cached?.translation||'';

  // Create inline card in chat
  const card=document.createElement('div');card.className='sa-card';
  card.innerHTML='<div class="sa-prompt">'+word+'</div>'
    +(trans?'<div class="sa-trans">'+trans+'</div>':'')
    +'<div class="sa-btns">'
    +'<button class="sa-btn sa-got" onclick="saGot(this)">&#10003; Got it</button>'
    +'<button class="sa-btn sa-wip" onclick="saWip(this)">&#9684; Working on it</button>'
    +'</div>';
  $('chat').appendChild(card);
  $('chat').scrollTop=$('chat').scrollHeight;
  saActiveEl=card;
  sndClick();

  // Also try to fetch translation if not cached
  if(!trans){
    fetch('/translate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({word:word})})
    .then(res=>res.json()).then(d=>{
      const t=card.querySelector('.sa-trans');
      if(!t){const nt=document.createElement('div');nt.className='sa-trans';nt.textContent=d.translation||'';card.querySelector('.sa-prompt').after(nt)}
      else{t.textContent=d.translation||''}
      tcache[word.toLowerCase()]=d;
    }).catch(()=>{});
  }
}

function removeSaCard(){if(saActiveEl){saActiveEl.remove();saActiveEl=null}saActiveWord=null;clearTimeout(saTimer)}

function saGot(btn){
  if(!saActiveWord)return;
  const word=saActiveWord;
  const rect=btn.getBoundingClientRect();
  confetti(rect.left+rect.width/2,rect.top,'green');
  sndGot();haptic('heavy');

  fetch('/vocab/assess',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({word:word,confident:true})})
  .then(res=>res.json()).then(d=>{
    if(saActiveEl){
      const box=d.box||1;const days=[0,0,1,3,14,60][box]||0;
      saActiveEl.innerHTML='<div class="sa-result got">&#10003; Got it!'
        +'<div class="sa-detail">Box '+box+(days>0?' · review in '+days+' day'+(days>1?'s':''):'')+'</div></div>';
      setTimeout(()=>{if(saActiveEl){saActiveEl.remove();saActiveEl=null}},2000);
    }
  }).catch(()=>{removeSaCard()});
  saActiveWord=null;
}

function saWip(btn){
  if(!saActiveWord)return;
  const word=saActiveWord;
  sndWip();haptic('light');

  fetch('/vocab/assess',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({word:word,confident:false})})
  .then(res=>res.json()).then(d=>{
    if(saActiveEl){
      saActiveEl.innerHTML='<div class="sa-result wip">&#9684; Working on it'
        +'<div class="sa-detail">Will come back soon</div></div>';
      setTimeout(()=>{if(saActiveEl){saActiveEl.remove();saActiveEl=null}},1500);
    }
  }).catch(()=>{removeSaCard()});
  saActiveWord=null;
}

// Audio recorder for user transcription
let recorder=null,recChunks=[];
function startRecorder(){
  if(!stream)return;
  try{
    recorder=new MediaRecorder(stream,{mimeType:'audio/webm;codecs=opus'});
    recorder.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data)};
    recorder.onstop=()=>{
      if(recChunks.length===0)return;
      const blob=new Blob(recChunks,{type:'audio/webm'});
      recChunks=[];
      if(blob.size<2000)return; // too short, probably noise
      transcribeAudio(blob);
    };
  }catch(e){console.error('Recorder init failed:',e)}
}

async function transcribeAudio(blob){
  try{
    const res=await fetch('/transcribe',{method:'POST',headers:{'Content-Type':'audio/webm'},body:blob});
    const d=await res.json();
    if(d.text&&d.text.trim()){
      const t=d.text.trim();
      addMsg('user',t);
      transcript.push({role:'user',text:t});
      checkSelfAssess(t);
      const lo=t.toLowerCase();
      if(GOODBYE.some(p=>lo.includes(p)))bye=true;
      checkCtx(t);
      const conf=CONFUSE.some(s=>s.length<=4?lo===s||lo===s.replace('?',''):lo.includes(s));
      if(conf&&dc?.readyState==='open')dc.send(JSON.stringify({type:'conversation.item.create',item:{type:'message',role:'system',content:[{type:'input_text',text:"He didn't understand. Say it again in plain English."}]}}));
    }
  }catch(e){console.error('Transcribe failed:',e)}
}

// Events
function handleEvt(e){if(!e?.type)return;switch(e.type){
case 'response.output_audio_transcript.delta':case 'response.audio_transcript.delta':if(e.delta){setSt('Luna is talking…','speak');onD(e.delta)}break;
case 'response.output_audio_transcript.done':case 'response.audio_transcript.done':onDone();setSt(ptt?'Hold to talk':'Listening…','listen');break;
case 'response.done':setSt(ptt?'Hold to talk':'Listening…','listen');if(bye){bye=false;setTimeout(endSession,2000)}break;
case 'input_audio_buffer.speech_started':
  setSt('Listening…','listen');removeSaCard();
  // Start recording user speech
  if(recorder&&recorder.state==='inactive'){try{recChunks=[];recorder.start()}catch(e){}}
  break;
case 'input_audio_buffer.speech_stopped':
  setSt('Thinking…','');
  // Stop recording — triggers onstop which transcribes
  if(recorder&&recorder.state==='recording'){try{recorder.stop()}catch(e){}}
  break;
case 'error':console.error('RT error:',e);setSt(e.error?.message||'Error','');break;
}}

// Session
async function startSession(){state='wait';setBtn('wait');setSt('Connecting…','');bye=false;cap=false;transcript=[];$('chat').innerHTML='';$('live').innerHTML='';
try{const sr=await fetch('/session',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});if(!sr.ok)throw new Error((await sr.json().catch(()=>({}))).error||'Server error');const sd=await sr.json();const key=sd.value;if(!key)throw new Error('No key');vocabMap=sd.vocabMastery||{};
stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}});
pc=new RTCPeerConnection();pc.ontrack=e=>{$('aud').srcObject=e.streams[0]};stream.getTracks().forEach(t=>pc.addTrack(t,stream));dc=pc.createDataChannel('oai-events');
dc.onopen=()=>{state='live';setBtn('live');setSt('Listening…','listen');startTmr();$('modeTog').classList.add('show');startRein();startRecorder();
setTimeout(()=>dc.send(JSON.stringify({type:'response.create'})),400)};
dc.onmessage=e=>{try{handleEvt(JSON.parse(e.data))}catch(err){console.error('Parse:',err.message)}};
const offer=await pc.createOffer();await pc.setLocalDescription(offer);const model=sd.model||'gpt-realtime-mini';
const sdpR=await fetch(`https://api.openai.com/v1/realtime/calls?model=${encodeURIComponent(model)}`,{method:'POST',headers:{Authorization:`Bearer ${key}`,'Content-Type':'application/sdp'},body:offer.sdp});
if(!sdpR.ok)throw new Error('SDP failed');await pc.setRemoteDescription({type:'answer',sdp:await sdpR.text()})
}catch(err){console.error('Start:',err);setSt(err.message,'');setBtn('idle');state='idle';stopTmr();cleanup()}}

function endSession(){if(state==='idle')return;const tr=[...transcript],dur=t0?Math.round((Date.now()-t0)/1000):0;
state='idle';stopTmr();clearInterval(reinI);setBtn('idle');setSt('Ready','');$('modeTog').classList.remove('show');$('pttBtn').className='btn-ptt';if(ptt)setMode(false);
if(tr.length)fetch('/session/end',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({transcript:tr,duration_seconds:dur})}).then(()=>setTimeout(showRecap,3500)).catch(e=>console.warn('Save:',e.message));
transcript=[];t0=null;bye=false;cap=false;cleanup()}

function cleanup(){if(recorder){try{recorder.stop()}catch{}recorder=null}recChunks=[];if(dc){try{dc.close()}catch{}dc=null}if(pc){try{pc.close()}catch{}pc=null}if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}$('aud').srcObject=null;lunaT='';wBuf='';wEl=null;if(popup){popup.remove();popup=null}}
function go(){if(state==='idle')startSession();else if(state==='live')endSession()}

// Panel
let panelOpen=false;
function togglePanel(){panelOpen=!panelOpen;$('overlay').className='overlay'+(panelOpen?' open':'');$('panel').className='panel'+(panelOpen?' open':'');if(panelOpen)loadProgress()}

async function loadProgress(){try{const r=await fetch('/progress');const d=await r.json();if(!d.profile)return;
$('pnlHero').innerHTML=`<div class="hero-num">${d.profile.words_known||0}</div><div class="hero-label">words known</div>`;
$('pnlPhase').innerHTML=`<div style="font-size:14px;font-weight:500;color:var(--text)">${d.profile.current_phase_name||'Survival'}</div><div class="phase-bar"><div class="phase-fill" style="width:${d.phaseCompletion||0}%"></div></div><div class="phase-lbl">${d.phaseCompletion||0}% complete</div>`;
$('pnlStats').innerHTML=`<div class="stat-row"><div class="stat"><div class="stat-val">${Math.round(d.profile.comprehension_score||0)}</div><div class="stat-lbl">Comprehension</div></div><div class="stat"><div class="stat-val">${Math.round(d.profile.production_score||0)}</div><div class="stat-lbl">Production</div></div><div class="stat"><div class="stat-val">${Math.round(d.profile.accuracy_score||0)}</div><div class="stat-lbl">Accuracy</div></div></div><div class="stat-row"><div class="stat"><div class="stat-val">${d.profile.total_sessions||0}</div><div class="stat-lbl">Sessions</div></div><div class="stat"><div class="stat-val">${d.profile.total_minutes||0}</div><div class="stat-lbl">Minutes</div></div></div>`;

if(d.vocabulary?.length){let vh='';d.vocabulary.forEach(v=>{const ms=Math.round(v.mastery_score||0);const col=ms>=70?'var(--green)':ms>=30?'var(--pt)':'var(--accent)';vh+=`<div class="vocab-item"><div><span class="vocab-w">${v.word}</span> <span class="vocab-t">${v.translation||''}</span></div><div class="vocab-m"><div class="vocab-mf" style="width:${ms}%;background:${col}"></div></div></div>`});$('pnlVocab').innerHTML=vh}

if(d.sessions?.length){let sh='';d.sessions.forEach(s=>{const dt=new Date(s.started_at);const df=dt.toLocaleDateString('en',{month:'short',day:'numeric'});const mins=Math.round((s.duration_seconds||0)/60);sh+=`<div class="sess-item"><div class="sess-date">${df} · ${mins} min${s.user_mood?' · '+s.user_mood:''}</div><div class="sess-sum">${s.session_summary||'No summary'}</div></div>`});$('pnlSessions').innerHTML=sh}
}catch(e){console.error('Progress load:',e)}}

// Recap
async function showRecap(){try{const r=await fetch('/recap/latest');const d=await r.json();if(!d)return;const mins=Math.round((d.duration_seconds||0)/60);
let tags='';(d.new_words_introduced||[]).forEach(w=>{tags+=`<span class="recap-tag recap-new">${w.word||w}</span>`});
(d.production_words||[]).forEach(w=>{tags+=`<span class="recap-tag recap-rev">${w} ✓</span>`});
$('recap').innerHTML=`<div class="recap-top"><span class="recap-title">Session complete</span><span class="recap-dur">${mins} min</span></div>${tags?`<div class="recap-words">${tags}</div>`:''}<div class="recap-sum">${d.session_summary||''}</div>`;
$('recap').classList.add('show');setTimeout(()=>$('recap').classList.remove('show'),10000)}catch(e){console.error('Recap:',e)}}
</script>
