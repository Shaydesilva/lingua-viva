<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Luna" />
  <meta name="theme-color" content="#0C0A10" />
  <title>Luna</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0C0A10;
      --surface:  #17131F;
      --surface2: #211C2E;
      --border:   #2A2438;
      --text:     #EDE8F5;
      --muted:    #6B607E;
      --accent:   #FF6B4A;
      --accent2:  #FF9A5C;
      --pt:       #E8B86D;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 12px;
      flex-shrink: 0;
    }

    .logo {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    .logo em {
      font-style: normal;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .timer {
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.05em;
      color: var(--muted);
      min-width: 36px;
      text-align: right;
    }
    .timer.active  { color: var(--accent); }
    .timer.warning { color: #f87171; }

    .ptt-pill {
      display: none;
      align-items: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 3px;
      gap: 2px;
    }
    .ptt-pill.show { display: flex; }

    .ptt-opt {
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, color 0.15s;
    }
    .ptt-opt.on { background: var(--accent); color: #fff; }

    /* ── History ── */
    #history {
      flex: 1;
      overflow-y: auto;
      padding: 6px 20px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
    }
    #history::-webkit-scrollbar { width: 2px; }
    #history::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .turn { display: flex; flex-direction: column; gap: 3px; }

    .turn-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .turn-body {
      font-size: 14px;
      line-height: 1.55;
      color: rgba(237, 232, 245, 0.55);
      display: flex;
      flex-wrap: wrap;
    }
    .turn-body.you {
      color: rgba(255, 154, 92, 0.75);
      justify-content: flex-end;
    }

    /* ── Divider ── */
    .rule {
      flex-shrink: 0;
      height: 1px;
      margin: 0 20px;
      background: linear-gradient(90deg, transparent, var(--border) 15%, var(--border) 85%, transparent);
    }

    /* ── Live area ── */
    #live {
      flex-shrink: 0;
      padding: 14px 20px 8px;
      min-height: 130px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 8px;
    }

    #statusRow {
      display: flex;
      align-items: center;
      gap: 7px;
      min-height: 18px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.listening { background: var(--accent); animation: pulse 1.4s ease-in-out infinite; }
    .dot.speaking  { background: var(--accent2); animation: pulse 0.7s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.8); }
    }

    #statusTxt {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    #liveText {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      min-height: 54px;
    }

    /* ── Word components ── */
    .w {
      font-size: 20px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--text);
      cursor: pointer;
      border-radius: 4px;
      padding: 0 2px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: background 0.1s, color 0.1s;
      display: inline;
    }
    .w:hover, .w:active {
      background: rgba(255, 107, 74, 0.18);
      color: var(--accent2);
    }
    .w.pt { color: var(--pt); }
    .w.pt:hover, .w.pt:active {
      background: rgba(232, 184, 109, 0.18);
      color: #F5C87A;
    }

    /* smaller word for history */
    .w.sm {
      font-size: 14px;
      padding: 0 1px;
    }

    .wlive {
      font-size: 20px;
      line-height: 1.5;
      color: rgba(237, 232, 245, 0.28);
      padding: 0 2px;
      display: inline;
      pointer-events: none;
    }

    @keyframes wIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .win { animation: wIn 0.16s ease forwards; }

    /* ── Controls ── */
    #controls {
      flex-shrink: 0;
      padding: 10px 20px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .btn {
      width: 100%;
      max-width: 320px;
      padding: 16px;
      border: none;
      border-radius: 100px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      transition: transform 0.12s, opacity 0.2s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-start {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 4px 28px rgba(255, 107, 74, 0.38);
    }
    .btn-end {
      background: var(--surface2);
      border: 1.5px solid #4A1515;
      color: #fca5a5;
    }
    .btn-load {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      color: var(--muted);
    }

    .btn-ptt {
      display: none;
      width: 100%;
      max-width: 320px;
      padding: 14px;
      border-radius: 100px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      user-select: none;
      transition: border-color 0.1s, background 0.1s, color 0.1s;
    }
    .btn-ptt.show { display: block; }
    .btn-ptt.pressed { background: var(--accent); border-color: var(--accent); color: #fff; }

    .recdot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #f87171;
      margin-right: 7px;
      animation: pulse 1s ease-in-out infinite;
      vertical-align: middle;
    }

    /* ── Translation popup ── */
    .tp {
      position: fixed;
      z-index: 9999;
      min-width: 150px;
      max-width: 220px;
      background: rgba(10, 8, 14, 0.97);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 107, 74, 0.4);
      border-radius: 14px;
      padding: 13px 16px 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      pointer-events: none;
      animation: tpIn 0.17s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes tpIn {
      from { opacity: 0; transform: scale(0.86) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .tp-word { font-size: 18px; font-weight: 600; color: var(--accent2); margin-bottom: 7px; }

    .tp-row { display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap; }

    .tp-badge {
      font-size: 9px; font-weight: 700; letter-spacing: 0.09em;
      text-transform: uppercase;
      background: rgba(232, 184, 109, 0.16);
      color: var(--pt);
      padding: 3px 8px;
      border-radius: 20px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .tp-def { font-size: 14px; color: var(--text); line-height: 1.4; }

    .tp-note { font-size: 11px; color: var(--muted); margin-top: 5px; line-height: 1.35; }

    .tp-spin {
      display: inline-block;
      width: 15px; height: 15px;
      border: 1.5px solid rgba(255,107,74,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="app">

  <header>
    <div class="logo">Luna <em>·</em> Rio</div>
    <div class="header-right">
      <div class="ptt-pill" id="pttPill">
        <div class="ptt-opt on" id="pttOpen" onclick="setPTT(false)">Open</div>
        <div class="ptt-opt" id="pttPush" onclick="setPTT(true)">Hold</div>
      </div>
      <div class="timer" id="timer">00:00</div>
    </div>
  </header>

  <div id="history"></div>

  <div class="rule"></div>

  <div id="live">
    <div id="statusRow">
      <span class="dot" id="dot"></span>
      <span id="statusTxt">Tap to start talking with Luna</span>
    </div>
    <div id="liveText"></div>
  </div>

  <div id="controls">
    <button class="btn btn-start" id="mainBtn" onclick="handleButton()">Start Conversation</button>
    <button class="btn-ptt" id="pttHoldBtn"
      ontouchstart="pttUnmute(event)" ontouchend="pttMute(event)"
      onmousedown="pttUnmute(event)" onmouseup="pttMute(event)">
      Hold to Talk
    </button>
  </div>

</div>

<audio id="remoteAudio" autoplay playsinline></audio>

<script>
  const MAX_MINS = 30;

  const GOODBYE = ["that's all for now","bye","tchau","até mais","talk later",
    "gotta go","see you later","good night","boa noite","falou","see ya",
    "goodbye","ciao","até logo"];

  const CONFUSION = ["i don't understand","i don't get it","in english",
    "english please","what does that mean","what did you say","come again",
    "i'm lost","i'm confused","what was that"];

  const PT_CHARS = /[ãõâêîôûçáéíóúàü]/i;
  const PT_WORDS = new Set(['tá','né','tô','cê','num','cara','gente','assim',
    'então','tipo','nossa','oi','tchau','obrigado','obrigada','legal','saudade',
    'carioca','boteco','praia','favela','rapaz','poxa','caramba','mano','véi',
    'ótimo','beleza','valeu','falou','não','sim','muito','mais','para','com',
    'uma','isso','bom','boa','bem','tudo','que','por','aqui','você','mas']);

  function isPt(w) {
    const c = w.toLowerCase().replace(/[.,!?;:'"«»()""]/g,'');
    return PT_CHARS.test(c) || PT_WORDS.has(c);
  }

  // ── State ─────────────────────────────────────────────────────────────────
  let pc = null, dc = null, localStream = null;
  let sessionModel = 'gpt-realtime-mini';
  let state = 'idle';
  let lunaBuffer = '', wordBuffer = '', liveWordEl = null;
  let sessionTranscript = [];
  let sessionStartTime = null;
  let timerInterval = null;
  let pendingGoodbye = false, costCapTriggered = false, pttMode = false;
  let translationCache = {}, activePopup = null;

  // ── DOM ────────────────────────────────────────────────────────────────────
  const historyEl = document.getElementById('history');
  const liveTextEl = document.getElementById('liveText');
  const dotEl      = document.getElementById('dot');
  const statusTxt  = document.getElementById('statusTxt');
  const mainBtn    = document.getElementById('mainBtn');
  const timerEl    = document.getElementById('timer');
  const pttPill    = document.getElementById('pttPill');
  const pttHoldBtn = document.getElementById('pttHoldBtn');
  const remoteAudio = document.getElementById('remoteAudio');

  // ── Helpers ────────────────────────────────────────────────────────────────
  function setStatus(msg, mode) {
    statusTxt.textContent = msg;
    dotEl.className = 'dot' + (mode ? ' ' + mode : '');
  }

  function setBtn(mode) {
    const b = mainBtn;
    if (mode === 'loading') {
      b.className = 'btn btn-load'; b.textContent = 'Connecting…'; b.disabled = true;
    } else if (mode === 'connected') {
      b.className = 'btn btn-end';
      b.innerHTML = '<span class="recdot"></span>End Conversation';
      b.disabled = false;
    } else {
      b.className = 'btn btn-start'; b.textContent = 'Start Conversation'; b.disabled = false;
    }
  }

  // ── Timer ──────────────────────────────────────────────────────────────────
  function startTimer() {
    sessionStartTime = Date.now();
    timerEl.className = 'timer active';
    timerInterval = setInterval(() => {
      const s = Math.floor((Date.now() - sessionStartTime) / 1000);
      const m = Math.floor(s / 60);
      timerEl.textContent = `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
      if (s >= 25*60) timerEl.className = 'timer warning';
      if (s >= MAX_MINS*60 && !costCapTriggered) triggerCostCap();
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval); timerInterval = null;
    timerEl.textContent = '00:00'; timerEl.className = 'timer';
  }

  function triggerCostCap() {
    costCapTriggered = true;
    if (dc?.readyState === 'open') {
      dc.send(JSON.stringify({ type: 'response.create', response: { modalities: ['text','audio'],
        instructions: `We've been chatting for ${MAX_MINS} minutes — time flies! Wrap up warmly and say a carioca goodbye.` } }));
      pendingGoodbye = true;
    }
  }

  // ── Word rendering ─────────────────────────────────────────────────────────
  function makeWord(text, small) {
    const clean = text.replace(/^["""'«(]+|[.,!?;:"""'»)]+$/g,'');
    const el = document.createElement('span');
    el.className = 'w win' + (small ? ' sm' : '') + (clean && isPt(clean) ? ' pt' : '');
    el.textContent = text;
    if (clean) {
      el.dataset.word = clean;
      el.addEventListener('click', e => { e.stopPropagation(); showTranslation(clean, el); });
    }
    return el;
  }

  function makeSpace() {
    const el = document.createElement('span');
    el.textContent = ' ';
    el.style.cssText = 'display:inline;pointer-events:none;user-select:none';
    return el;
  }

  // Stream live words into #liveText as delta arrives
  function onDelta(delta) {
    lunaBuffer += delta;
    for (const ch of delta) {
      if (ch === ' ' || ch === '\n') {
        if (wordBuffer) {
          if (liveWordEl) { liveWordEl.remove(); liveWordEl = null; }
          liveTextEl.appendChild(makeWord(wordBuffer));
          wordBuffer = '';
        }
        liveTextEl.appendChild(makeSpace());
      } else {
        wordBuffer += ch;
        if (!liveWordEl) {
          liveWordEl = document.createElement('span');
          liveWordEl.className = 'wlive';
          liveTextEl.appendChild(liveWordEl);
        }
        liveWordEl.textContent = wordBuffer;
      }
    }
  }

  // Luna finished speaking: commit remaining word, push full turn to history
  function onDone() {
    if (wordBuffer) {
      if (liveWordEl) { liveWordEl.remove(); liveWordEl = null; }
      liveTextEl.appendChild(makeWord(wordBuffer));
      wordBuffer = '';
    }
    if (liveWordEl) { liveWordEl.remove(); liveWordEl = null; }

    const text = lunaBuffer.trim();
    if (text) {
      sessionTranscript.push({ role: 'assistant', text });

      const turn = document.createElement('div');
      turn.className = 'turn';
      const label = document.createElement('div');
      label.className = 'turn-label'; label.textContent = 'Luna';
      const body = document.createElement('div');
      body.className = 'turn-body';

      text.split(/(\s+)/).forEach(tok => {
        if (/^\s+$/.test(tok)) { body.appendChild(makeSpace()); }
        else if (tok) { body.appendChild(makeWord(tok, true)); }
      });

      turn.appendChild(label); turn.appendChild(body);
      historyEl.appendChild(turn);
      historyEl.scrollTop = historyEl.scrollHeight;
    }

    liveTextEl.innerHTML = '';
    lunaBuffer = '';
  }

  function addUserTurn(text) {
    const turn = document.createElement('div');
    turn.className = 'turn';
    const label = document.createElement('div');
    label.className = 'turn-label'; label.textContent = 'You';
    const body = document.createElement('div');
    body.className = 'turn-body you'; body.textContent = text;
    turn.appendChild(label); turn.appendChild(body);
    historyEl.appendChild(turn);
    historyEl.scrollTop = historyEl.scrollHeight;
  }

  // ── Translation popup ──────────────────────────────────────────────────────
  async function showTranslation(word, anchor) {
    if (activePopup) { activePopup.remove(); activePopup = null; }

    const popup = document.createElement('div');
    popup.className = 'tp';
    popup.innerHTML = `<div class="tp-word">${word}</div><div class="tp-row"><span class="tp-spin"></span></div>`;
    document.body.appendChild(popup);
    activePopup = popup;
    positionPopup(popup, anchor);

    const key = word.toLowerCase();
    if (!translationCache[key]) {
      try {
        const r = await fetch('/translate', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ word }),
        });
        translationCache[key] = await r.json();
      } catch { translationCache[key] = { translation: '—', language: 'unknown' }; }
    }

    if (popup !== activePopup) return;
    const d = translationCache[key];
    popup.querySelector('.tp-row').innerHTML =
      (d.language === 'pt' ? '<span class="tp-badge">PT · BR</span>' : '') +
      `<span class="tp-def">${d.translation || '—'}</span>`;
    if (d.note) {
      const n = document.createElement('div');
      n.className = 'tp-note'; n.textContent = d.note;
      popup.appendChild(n);
    }
    setTimeout(() => { if (popup === activePopup) { popup.remove(); activePopup = null; } }, 4500);
  }

  function positionPopup(popup, anchor) {
    const r = anchor.getBoundingClientRect();
    const W = 220, gap = 10;
    let top = r.top - 100 - gap;
    if (top < 10) top = r.bottom + gap;
    let left = r.left + r.width/2 - W/2;
    left = Math.max(8, Math.min(left, window.innerWidth - W - 8));
    Object.assign(popup.style, { top: top+'px', left: left+'px', width: W+'px' });
  }

  document.addEventListener('click', () => {
    if (activePopup) { activePopup.remove(); activePopup = null; }
  });

  // ── PTT ────────────────────────────────────────────────────────────────────
  function setPTT(enabled) {
    pttMode = enabled;
    document.getElementById('pttOpen').className = 'ptt-opt' + (!enabled ? ' on' : '');
    document.getElementById('pttPush').className = 'ptt-opt' + ( enabled ? ' on' : '');
    pttHoldBtn.className = 'btn-ptt' + (enabled ? ' show' : '');
    if (localStream) localStream.getAudioTracks().forEach(t => { t.enabled = !enabled; });
  }

  function pttUnmute(e) {
    e.preventDefault();
    if (!pttMode || !localStream) return;
    localStream.getAudioTracks().forEach(t => { t.enabled = true; });
    pttHoldBtn.classList.add('pressed');
  }

  function pttMute(e) {
    e.preventDefault();
    if (!pttMode || !localStream) return;
    localStream.getAudioTracks().forEach(t => { t.enabled = false; });
    pttHoldBtn.classList.remove('pressed');
  }

  // ── Event handler ──────────────────────────────────────────────────────────
  function handleEvent(evt) {
    if (!evt?.type) return;
    switch (evt.type) {

      case 'response.audio_transcript.delta':
        if (evt.delta) { setStatus('Luna is speaking…', 'speaking'); onDelta(evt.delta); }
        break;

      case 'response.audio_transcript.done':
        onDone();
        setStatus(pttMode ? 'Hold button to speak' : 'Listening…', 'listening');
        break;

      case 'response.done':
        setStatus(pttMode ? 'Hold button to speak' : 'Listening…', 'listening');
        if (pendingGoodbye) { pendingGoodbye = false; setTimeout(endSession, 2000); }
        break;

      case 'conversation.item.input_audio_transcription.completed': {
        const text = evt.transcript?.trim();
        if (text) {
          addUserTurn(text);
          sessionTranscript.push({ role: 'user', text });
          if (GOODBYE.some(p => text.toLowerCase().includes(p))) pendingGoodbye = true;
          if (CONFUSION.some(s => text.toLowerCase().includes(s))) {
            if (dc?.readyState === 'open') {
              dc.send(JSON.stringify({ type: 'conversation.item.create', item: {
                type: 'message', role: 'system',
                content: [{ type: 'input_text', text: "He didn't follow. Rephrase in plain English, naturally. Keep going." }],
              }}));
            }
          }
        }
        break;
      }

      case 'input_audio_buffer.speech_started':
        setStatus('Listening…', 'listening'); break;

      case 'input_audio_buffer.speech_stopped':
        setStatus('Processing…', 'listening'); break;

      case 'error':
        console.error('Realtime error:', evt);
        setStatus(evt.error?.message || 'Error', '');
        break;
    }
  }

  // ── Session start ──────────────────────────────────────────────────────────
  async function startSession() {
    state = 'loading';
    setBtn('loading');
    setStatus('Connecting…', '');
    pendingGoodbye = false; costCapTriggered = false;
    sessionTranscript = [];
    historyEl.innerHTML = '';
    liveTextEl.innerHTML = '';

    try {
      const sr = await fetch('/session', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}',
      });
      if (!sr.ok) throw new Error((await sr.json().catch(()=>({}))).error || 'Server error');
      const sd = await sr.json();
      const key = sd.value;
      sessionModel = sd.model || 'gpt-realtime-mini';
      if (!key) throw new Error('No ephemeral key');

      localStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
      });

      pc = new RTCPeerConnection();
      pc.ontrack = e => { remoteAudio.srcObject = e.streams[0]; };
      localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
      dc = pc.createDataChannel('oai-events');

      dc.onopen = () => {
        state = 'connected';
        setBtn('connected');
        setStatus('Listening…', 'listening');
        startTimer();
        pttPill.classList.add('show');

        dc.send(JSON.stringify({ type: 'session.update', session: {
          turn_detection: { type: 'server_vad', threshold: 0.8, prefix_padding_ms: 300, silence_duration_ms: 1200 },
          input_audio_transcription: { model: 'whisper-1' },
        }}));

        setTimeout(() => {
          dc.send(JSON.stringify({ type: 'response.create', response: { modalities: ['text','audio'] } }));
        }, 350);
      };

      dc.onmessage = e => { try { handleEvent(JSON.parse(e.data)); } catch {} };
      dc.onerror = e => console.error('DC error:', e);

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      const sdpR = await fetch(
        `https://api.openai.com/v1/realtime/calls?model=${encodeURIComponent(sessionModel)}`,
        { method: 'POST', headers: { Authorization: `Bearer ${key}`, 'Content-Type': 'application/sdp' }, body: offer.sdp }
      );
      if (!sdpR.ok) throw new Error('SDP failed: ' + await sdpR.text());
      await pc.setRemoteDescription({ type: 'answer', sdp: await sdpR.text() });

    } catch (err) {
      console.error('Start failed:', err);
      setStatus(err.message, '');
      setBtn('idle'); state = 'idle';
      stopTimer(); cleanup();
    }
  }

  // ── Session end ────────────────────────────────────────────────────────────
  function endSession() {
    if (state === 'idle') return;
    const transcript = [...sessionTranscript];
    const duration_seconds = sessionStartTime ? Math.round((Date.now() - sessionStartTime) / 1000) : 0;

    state = 'idle';
    stopTimer();
    setBtn('idle');
    setStatus('Tap to start talking with Luna', '');
    pttPill.classList.remove('show');
    pttHoldBtn.className = 'btn-ptt';
    if (pttMode) setPTT(false);

    if (transcript.length) {
      fetch('/session/end', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transcript, duration_seconds }),
      }).catch(e => console.warn('Save failed:', e.message));
    }

    sessionTranscript = []; sessionStartTime = null;
    pendingGoodbye = false; costCapTriggered = false;
    cleanup();
  }

  function cleanup() {
    if (dc)          { try { dc.close(); }           catch {} dc = null; }
    if (pc)          { try { pc.close(); }           catch {} pc = null; }
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    remoteAudio.srcObject = null;
    lunaBuffer = ''; wordBuffer = ''; liveWordEl = null;
    if (activePopup) { activePopup.remove(); activePopup = null; }
  }

  function handleButton() {
    if (state === 'idle') startSession();
    else if (state === 'connected') endSession();
  }
</script>
</body>
</html>
