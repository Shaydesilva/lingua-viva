<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Luna" />
  <meta name="theme-color" content="#0A0A0A" />
  <title>Luna — Portuguese Tutor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0A0A0A;
      --surface: #141414;
      --border: #222;
      --text: #F0F0F0;
      --muted: #666;
      --accent: #A855F7;
      --accent2: #EC4899;
      --user-bubble: #1a1a2e;
      --luna-bubble: #1a0a2e;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--text);
    }

    .logo span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .orb-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px 20px;
      flex-shrink: 0;
      gap: 14px;
    }

    .orb-wrap {
      position: relative;
      width: 120px;
      height: 120px;
    }

    .orb-ring {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, var(--accent), var(--accent2), var(--accent));
      opacity: 0;
      filter: blur(8px);
      transition: opacity 0.6s ease;
      animation: none;
    }

    .orb-ring.active {
      opacity: 0.5;
      animation: spin 4s linear infinite;
    }

    .orb-ring.speaking {
      opacity: 0.8;
      animation: spin 2s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .orb {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #2a1040, #0d0d0d);
      border: 1.5px solid #2a1040;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease, border-color 0.4s ease;
    }

    .orb.active {
      border-color: var(--accent);
      animation: pulse 2.5s ease-in-out infinite;
    }

    .orb.speaking {
      border-color: var(--accent2);
      animation: pulse-fast 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(168,85,247,0); }
      50% { transform: scale(1.04); box-shadow: 0 0 20px 6px rgba(168,85,247,0.18); }
    }

    @keyframes pulse-fast {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(236,72,153,0); }
      50% { transform: scale(1.06); box-shadow: 0 0 24px 8px rgba(236,72,153,0.22); }
    }

    .orb svg {
      width: 44px;
      height: 44px;
      opacity: 0.6;
      transition: opacity 0.3s;
    }

    .orb.active svg, .orb.speaking svg { opacity: 1; }

    .status-text {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.02em;
      min-height: 18px;
      transition: color 0.3s;
    }

    .status-text.active { color: #a78bfa; }
    .status-text.speaking { color: #f472b6; }
    .status-text.error { color: #f87171; }

    .transcript {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      -webkit-overflow-scrolling: touch;
    }

    .transcript:empty::after {
      content: "Your conversation will appear here";
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      margin-top: 24px;
    }

    .bubble {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.45;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .bubble.user {
      align-self: flex-end;
      background: var(--user-bubble);
      border: 1px solid #2a2a4a;
      color: #c4b5fd;
      border-bottom-right-radius: 6px;
    }

    .bubble.luna {
      align-self: flex-start;
      background: var(--luna-bubble);
      border: 1px solid #3a1a4a;
      color: #f0abfc;
      border-bottom-left-radius: 6px;
    }

    .bubble .speaker {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.5;
      margin-bottom: 4px;
    }

    .controls {
      padding: 16px 20px 20px;
      display: flex;
      justify-content: center;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 40px;
      border-radius: 100px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      letter-spacing: 0.01em;
    }

    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-start {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      box-shadow: 0 4px 24px rgba(168,85,247,0.3);
    }

    .btn-end {
      background: #1a0a0a;
      border: 1.5px solid #7f1d1d;
      color: #fca5a5;
    }

    .btn-loading {
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--muted);
    }

    .mic-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      animation: blink 1s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .transcript::-webkit-scrollbar { width: 3px; }
    .transcript::-webkit-scrollbar-track { background: transparent; }
    .transcript::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">Luna <span>·</span> Português Brasileiro</div>
  </header>

  <div class="orb-area">
    <div class="orb-wrap">
      <div class="orb-ring" id="orbRing"></div>
      <div class="orb" id="orb">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="8" y1="22" x2="16" y2="22"/>
        </svg>
      </div>
    </div>
    <div class="status-text" id="statusText">Tap to start speaking with Luna</div>
  </div>

  <div class="transcript" id="transcript"></div>

  <div class="controls">
    <button class="btn btn-start" id="mainBtn" onclick="handleButton()">
      Start Conversation
    </button>
  </div>
</div>

<audio id="remoteAudio" autoplay playsinline></audio>

<script>
  let pc = null, dc = null, localStream = null;
  let sessionModel = 'gpt-realtime';
  let state = 'idle';
  let lunaBuffer = '', lunaBubble = null;

  const orbEl = document.getElementById('orb');
  const orbRing = document.getElementById('orbRing');
  const statusEl = document.getElementById('statusText');
  const transcriptEl = document.getElementById('transcript');
  const mainBtn = document.getElementById('mainBtn');
  const remoteAudio = document.getElementById('remoteAudio');

  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = 'status-text' + (cls ? ' ' + cls : '');
  }

  function setOrb(mode) {
    orbEl.className = 'orb' + (mode ? ' ' + mode : '');
    orbRing.className = 'orb-ring' + (mode ? ' ' + mode : '');
  }

  function setBtn(mode) {
    if (mode === 'loading') {
      mainBtn.className = 'btn btn-loading';
      mainBtn.innerHTML = 'Connecting…';
      mainBtn.disabled = true;
    } else if (mode === 'connected') {
      mainBtn.className = 'btn btn-end';
      mainBtn.innerHTML = '<span class="mic-dot"></span> End Conversation';
      mainBtn.disabled = false;
    } else {
      mainBtn.className = 'btn btn-start';
      mainBtn.innerHTML = 'Start Conversation';
      mainBtn.disabled = false;
    }
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function addBubble(who, text) {
    const div = document.createElement('div');
    div.className = 'bubble ' + who;
    div.innerHTML = `<div class="speaker">${who === 'user' ? 'You' : 'Luna'}</div>${escHtml(text)}`;
    transcriptEl.appendChild(div);
    transcriptEl.scrollTop = transcriptEl.scrollHeight;
    return div;
  }

  function updateLunaBubble(delta) {
    lunaBuffer += delta;
    if (!lunaBubble) {
      lunaBubble = document.createElement('div');
      lunaBubble.className = 'bubble luna';
      lunaBubble.innerHTML = '<div class="speaker">Luna</div><span class="text"></span>';
      transcriptEl.appendChild(lunaBubble);
    }
    lunaBubble.querySelector('.text').textContent = lunaBuffer;
    transcriptEl.scrollTop = transcriptEl.scrollHeight;
  }

  function flushLunaBubble() { lunaBubble = null; lunaBuffer = ''; }

  function handleEvent(evt) {
    if (!evt || !evt.type) return;
    switch (evt.type) {
      case 'response.audio_transcript.delta':
        if (evt.delta) {
          setOrb('speaking');
          setStatus('Luna is speaking…', 'speaking');
          updateLunaBubble(evt.delta);
        }
        break;
      case 'response.audio_transcript.done':
        flushLunaBubble();
        setOrb('active');
        setStatus('Listening…', 'active');
        break;
      case 'response.done':
        setOrb('active');
        setStatus('Listening…', 'active');
        break;
      case 'conversation.item.input_audio_transcription.completed':
        if (evt.transcript && evt.transcript.trim())
          addBubble('user', evt.transcript.trim());
        break;
      case 'input_audio_buffer.speech_started':
        setStatus('Listening…', 'active');
        setOrb('active');
        break;
      case 'input_audio_buffer.speech_stopped':
        setStatus('Processing…', 'active');
        break;
      case 'error':
        console.error('Realtime error:', evt);
        setStatus('Error: ' + (evt.error?.message || 'unknown'), 'error');
        break;
    }
  }

  async function startSession() {
    state = 'loading';
    setBtn('loading');
    setStatus('Connecting to Luna…');
    try {
      const sessionRes = await fetch('/session', { method: 'POST' });
      if (!sessionRes.ok) {
        const err = await sessionRes.json().catch(() => ({ error: 'Server error' }));
        throw new Error(err.error || 'Failed to create session');
      }
      const sessionData = await sessionRes.json();
      const ephemeralKey = sessionData.value;
      sessionModel = sessionData.model || 'gpt-realtime';
      if (!ephemeralKey) throw new Error('No ephemeral key in session response');

      localStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
      });

      pc = new RTCPeerConnection();
      pc.ontrack = (e) => { remoteAudio.srcObject = e.streams[0]; };
      localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

      dc = pc.createDataChannel('oai-events');
      dc.onopen = () => {
        state = 'connected';
        setBtn('connected');
        setOrb('active');
        setStatus('Listening…', 'active');
        dc.send(JSON.stringify({
          type: 'session.update',
          session: {
            turn_detection: { type: 'server_vad', threshold: 0.5, prefix_padding_ms: 300, silence_duration_ms: 700 },
            input_audio_transcription: { model: 'whisper-1' },
          }
        }));
        setTimeout(() => dc.send(JSON.stringify({ type: 'response.create', response: { modalities: ['text', 'audio'] } })), 300);
      };
      dc.onmessage = (e) => { try { handleEvent(JSON.parse(e.data)); } catch(err) {} };
      dc.onerror = (e) => console.error('DC error:', e);

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      const sdpRes = await fetch(
        `https://api.openai.com/v1/realtime/calls?model=${encodeURIComponent(sessionModel)}`,
        { method: 'POST', headers: { Authorization: `Bearer ${ephemeralKey}`, 'Content-Type': 'application/sdp' }, body: offer.sdp }
      );
      if (!sdpRes.ok) throw new Error('SDP exchange failed: ' + await sdpRes.text());
      await pc.setRemoteDescription({ type: 'answer', sdp: await sdpRes.text() });
      setStatus('Connected — say something in Portuguese!', 'active');
    } catch (err) {
      console.error('Start failed:', err);
      setStatus(err.message, 'error');
      setOrb(''); setBtn('idle'); state = 'idle'; cleanup();
    }
  }

  function cleanup() {
    if (dc) { try { dc.close(); } catch(e){} dc = null; }
    if (pc) { try { pc.close(); } catch(e){} pc = null; }
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    remoteAudio.srcObject = null;
    lunaBuffer = ''; lunaBubble = null;
  }

  function endSession() {
    state = 'idle'; cleanup(); setBtn('idle'); setOrb('');
    setStatus('Tap to start speaking with Luna');
  }

  function handleButton() {
    if (state === 'idle') startSession();
    else if (state === 'connected') endSession();
  }
</script>
</body>
</html>
