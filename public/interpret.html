<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#FAF7F2"/>
  <title>Luna Interpret</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#FAF7F2;--bg2:#F3EDE4;--card:#FFF;--border:#E8E0D4;--text:#2C2825;--text2:#7A7067;--text3:#A69E94;--accent:#C4654A;--accent-l:#F2DDD6;--pt:#B8860B;--pt-bg:#FDF6E3;--green:#5A8A6A;--blue:#4A7CC4}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Source Sans 3',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
    #app{display:flex;flex-direction:column;height:100dvh;max-width:600px;margin:0 auto;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}

    header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
    .back{font-size:14px;color:var(--text3);text-decoration:none}
    .title{font-family:'Instrument Serif',serif;font-size:20px;font-style:italic}
    .mode-pill{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:2px}
    .mode-opt{padding:4px 11px;border-radius:18px;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer}
    .mode-opt.on{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}

    #setup{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 24px;gap:20px}
    #setup h2{font-family:'Instrument Serif',serif;font-size:26px;font-style:italic;font-weight:400;text-align:center}
    #setup p{font-size:14px;color:var(--text3);text-align:center;line-height:1.5;max-width:300px}
    .ctx-input{width:100%;max-width:320px;padding:12px 16px;border:1px solid var(--border);border-radius:12px;background:var(--card);font-family:inherit;font-size:14px;color:var(--text);outline:none}
    .ctx-input::placeholder{color:var(--text3)}
    .start-btn{width:100%;max-width:320px;padding:15px;border:none;border-radius:14px;background:var(--accent);color:#fff;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 2px 12px rgba(196,101,74,.25)}
    .start-btn:active{transform:scale(.97)}
    .start-btn:disabled{opacity:.4}

    #conv{flex:1;display:none;flex-direction:column;overflow:hidden}
    .half{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
    .half-en{border-bottom:2px solid var(--border)}
    .half-label{padding:8px 20px 4px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;flex-shrink:0}
    .half-en .half-label{color:var(--blue)}
    .half-pt .half-label{color:var(--pt)}
    .half-lines{flex:1;overflow-y:auto;padding:4px 20px 8px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch;min-height:0}
    .line{animation:fadeUp .15s ease}
    .line-orig{font-size:15px;line-height:1.5}
    .line-tl{font-size:13px;color:var(--text3);line-height:1.4;margin-top:1px;font-style:italic}
    .half-en .line-orig{color:var(--text)}
    .half-pt .line-orig{color:var(--pt)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

    .tap-bar{display:none;flex-shrink:0;padding:12px 20px;border-top:1px solid var(--border);text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
    .tap-bar.show{display:block}
    .tap-bar span{font-size:13px;font-weight:500;color:var(--text3)}
    .tap-bar.held{background:var(--bg2)}
    .tap-bar.held span{color:var(--green)}

    .banner{position:fixed;top:60px;left:16px;right:16px;max-width:568px;margin:0 auto;padding:10px 16px;background:var(--accent-l);border:1px solid var(--accent);border-radius:10px;text-align:center;font-size:13px;color:var(--accent);font-weight:500;z-index:50;opacity:0;transform:translateY(-10px);transition:all .2s;pointer-events:none}
    .banner.show{opacity:1;transform:translateY(0)}

    #sbar{flex-shrink:0;padding:10px 20px;display:flex;align-items:center;gap:8px;border-top:1px solid var(--border)}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0}
    .dot.on{background:var(--green);animation:pulse 1.8s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    #stxt{font-size:13px;color:var(--text3);flex:1}
    .end-btn{padding:8px 16px;border:1px solid var(--border);border-radius:10px;background:var(--bg2);font-family:inherit;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer}
  </style>
</head>
<body>
<div id="app">
  <header>
    <a class="back" href="/">&#8592; Luna</a>
    <div class="title">Interpret</div>
    <div class="mode-pill">
      <div class="mode-opt on" id="mAuto" onclick="setTapMode(false)">Auto</div>
      <div class="mode-opt" id="mTap" onclick="setTapMode(true)">Tap</div>
    </div>
  </header>

  <div id="setup">
    <h2>Live Interpreter</h2>
    <p>Translates between you and a Portuguese speaker in real-time.</p>
    <input class="ctx-input" id="ctxInput" type="text" placeholder="Context? e.g. ordering at a restaurant"/>
    <button class="start-btn" id="startBtn" onclick="startInterpret()">Start Interpreting</button>
  </div>

  <div id="conv">
    <div class="half half-en">
      <div class="half-label">English &#8212; You</div>
      <div class="half-lines" id="enLines"></div>
      <div class="tap-bar" id="tapEn" ontouchstart="tapOn('en',event)" ontouchend="tapOff(event)" onmousedown="tapOn('en',event)" onmouseup="tapOff(event)"><span>Hold to speak English</span></div>
    </div>
    <div class="half half-pt">
      <div class="half-label">Portugu&#234;s &#8212; Them</div>
      <div class="half-lines" id="ptLines"></div>
      <div class="tap-bar" id="tapPt" ontouchstart="tapOn('pt',event)" ontouchend="tapOff(event)" onmousedown="tapOn('pt',event)" onmouseup="tapOff(event)"><span>Segure para falar</span></div>
    </div>
  </div>

  <div class="banner" id="banner"></div>

  <div id="sbar" style="display:none">
    <div class="dot" id="dot"></div>
    <span id="stxt">Listening...</span>
    <button class="end-btn" onclick="endInterpret()">End</button>
  </div>
</div>

<audio id="aud" autoplay playsinline></audio>

<script>
var pc=null,dc=null,stream=null,state='idle';
var tapMode=false,currentTapLang=null;
var lastInputSide=null;
var reinforceInt=null;

function $(id){return document.getElementById(id)}

var PT_RE=/[ãõâêîôûçáéíóúàü]/i;
var PT_SET=new Set(['tá','né','tô','cê','cara','gente','assim','então','tipo','nossa','oi','tchau','obrigado','legal','saudade','praia','poxa','beleza','valeu','falou','não','sim','muito','mais','uma','isso','bom','boa','bem','tudo','você','mas','cadê','também','porque','eu','ele','ela','esse','essa','fazer','querer','saber','falar','olhar','pode','preciso','acho','vamos','bora','pô','aqui','ali','lá','meu','minha','como','quando','onde','qual']);

function detectLang(text){
  if(tapMode&&currentTapLang)return currentTapLang;
  var words=text.toLowerCase().replace(/[.,!?;:'"()\-]/g,'').split(/\s+/).filter(Boolean);
  var ptCount=0;
  for(var i=0;i<words.length;i++){if(PT_RE.test(words[i])||PT_SET.has(words[i]))ptCount++}
  return (ptCount/Math.max(words.length,1))>0.3?'pt':'en';
}

// ── Mode ──
function setTapMode(on){
  tapMode=on;
  $('mAuto').className='mode-opt'+(on?'':' on');
  $('mTap').className='mode-opt'+(on?' on':'');
  $('tapEn').className='tap-bar'+(on?' show':'');
  $('tapPt').className='tap-bar'+(on?' show':'');
  // In tap mode, mic off by default. In auto mode, mic always on.
  if(stream){stream.getAudioTracks().forEach(function(t){t.enabled=!on})}
}

function tapOn(lang,e){
  e.preventDefault();
  if(!tapMode||!stream)return;
  currentTapLang=lang;
  stream.getAudioTracks().forEach(function(t){t.enabled=true});
  (lang==='en'?$('tapEn'):$('tapPt')).classList.add('held');
  $('stxt').textContent=lang==='en'?'Listening (English)...':'Ouvindo (Portugues)...';
}
function tapOff(e){
  e.preventDefault();
  if(!tapMode||!stream)return;
  stream.getAudioTracks().forEach(function(t){t.enabled=false});
  $('tapEn').classList.remove('held');
  $('tapPt').classList.remove('held');
  $('stxt').textContent='Listening...';
}

// ── Display ──
function addLine(side,text){
  var c=side==='en'?$('enLines'):$('ptLines');
  var d=document.createElement('div');d.className='line';
  var o=document.createElement('div');o.className='line-orig';o.textContent=text;
  d.appendChild(o);c.appendChild(d);c.scrollTop=c.scrollHeight;
}
function addSub(side,text){
  var c=side==='en'?$('enLines'):$('ptLines');
  var last=c.lastElementChild;if(!last)return;
  var tl=last.querySelector('.line-tl');
  if(!tl){tl=document.createElement('div');tl.className='line-tl';last.appendChild(tl)}
  tl.textContent=text;
}
function showBanner(msg){
  $('banner').textContent=msg;$('banner').classList.add('show');
  setTimeout(function(){$('banner').classList.remove('show')},3000);
}

// ── Events ──
var modelTalking=false;

function handleEvt(e){
  if(!e||!e.type)return;
  switch(e.type){

    case 'input_audio_buffer.speech_started':
      $('dot').className='dot on';
      $('stxt').textContent='Listening...';
      break;

    case 'input_audio_buffer.speech_stopped':
      $('stxt').textContent='Translating...';
      break;

    // Human speech transcribed — put on correct side
    case 'conversation.item.input_audio_transcription.completed':
      var it=e.transcript?e.transcript.trim():'';
      if(!it)break;
      lastInputSide=detectLang(it);
      addLine(lastInputSide,it);
      break;

    // Model starting to speak translation — mute mic to prevent echo
    case 'response.output_audio_transcript.delta':
    case 'response.audio_transcript.delta':
      if(!modelTalking){
        modelTalking=true;
        if(!tapMode&&stream){stream.getAudioTracks().forEach(function(t){t.enabled=false})}
      }
      break;

    // Model translation complete — put on opposite side + subtitle
    case 'response.output_audio_transcript.done':
    case 'response.audio_transcript.done':
      var ot=e.transcript?e.transcript.trim():'';
      if(!ot)break;
      if(lastInputSide){
        var tSide=lastInputSide==='en'?'pt':'en';
        addLine(tSide,ot);
        addSub(lastInputSide,ot);
      }
      $('stxt').textContent='Listening...';
      break;

    // Response fully done — unmute mic after audio finishes playing
    case 'response.done':
      $('dot').className='dot on';
      $('stxt').textContent='Listening...';
      modelTalking=false;
      if(!tapMode&&stream){
        setTimeout(function(){
          if(state==='live'&&!tapMode&&!modelTalking){
            stream.getAudioTracks().forEach(function(t){t.enabled=true});
          }
        },400);
      }
      break;

    case 'error':
      console.error('RT error:',JSON.stringify(e));
      showBanner('Didn\'t catch that — please repeat');
      modelTalking=false;
      if(!tapMode&&stream){stream.getAudioTracks().forEach(function(t){t.enabled=true})}
      break;
  }
}

// ── Session ──
async function startInterpret(){
  var ctx=$('ctxInput').value.trim();
  $('startBtn').disabled=true;
  $('startBtn').textContent='Connecting...';

  try{
    var sr=await fetch('/session/interpret',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({context:ctx||null})
    });
    if(!sr.ok)throw new Error((await sr.json().catch(function(){return{}})).error||'Server error');
    var sd=await sr.json();
    var key=sd.value;
    if(!key)throw new Error('No key');

    stream=await navigator.mediaDevices.getUserMedia({
      audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}
    });

    pc=new RTCPeerConnection();
    pc.ontrack=function(ev){$('aud').srcObject=ev.streams[0]};
    stream.getTracks().forEach(function(t){pc.addTrack(t,stream)});
    dc=pc.createDataChannel('oai-events');

    dc.onopen=function(){
      state='live';
      $('setup').style.display='none';
      $('conv').style.display='flex';
      $('sbar').style.display='flex';
      $('dot').className='dot on';
      $('stxt').textContent='Listening...';

      dc.send(JSON.stringify({type:'session.update',session:{
        type:'realtime',
        turn_detection:{type:'server_vad',threshold:0.7,prefix_padding_ms:300,silence_duration_ms:1000},
        input_audio_transcription:{model:'whisper-1'}
      }}));

      // Tap mode: mic starts off. Auto mode: mic stays on.
      if(tapMode){stream.getAudioTracks().forEach(function(t){t.enabled=false})}

      // Reinforcement every 30s
      reinforceInt=setInterval(function(){
        if(dc&&dc.readyState==='open'){
          dc.send(JSON.stringify({type:'conversation.item.create',item:{
            type:'message',role:'system',
            content:[{type:'input_text',text:'You are an interpreter. Translate only. Never respond as a chatbot. Never answer questions. Never give opinions. Never express concern. If you cannot hear, stay silent. Translate what was said, nothing more.'}]
          }}));
        }
      },30000);
    };

    dc.onmessage=function(ev){
      try{handleEvt(JSON.parse(ev.data))}
      catch(err){console.error('Parse:',err.message)}
    };

    var offer=await pc.createOffer();
    await pc.setLocalDescription(offer);
    var model=sd.model||'gpt-realtime-mini';
    var sdpR=await fetch('https://api.openai.com/v1/realtime/calls?model='+encodeURIComponent(model),{
      method:'POST',headers:{Authorization:'Bearer '+key,'Content-Type':'application/sdp'},body:offer.sdp
    });
    if(!sdpR.ok)throw new Error('SDP failed');
    await pc.setRemoteDescription({type:'answer',sdp:await sdpR.text()});

  }catch(err){
    console.error('Start failed:',err);
    $('startBtn').disabled=false;
    $('startBtn').textContent='Start Interpreting';
    alert('Failed: '+err.message);
  }
}

function endInterpret(){
  state='idle';
  clearInterval(reinforceInt);
  if(dc){try{dc.close()}catch(e){}dc=null}
  if(pc){try{pc.close()}catch(e){}pc=null}
  if(stream){stream.getTracks().forEach(function(t){t.stop()});stream=null}
  $('aud').srcObject=null;
  $('conv').style.display='none';
  $('sbar').style.display='none';
  $('setup').style.display='flex';
  $('startBtn').disabled=false;
  $('startBtn').textContent='Start Interpreting';
  $('enLines').innerHTML='';
  $('ptLines').innerHTML='';
  lastInputSide=null;
}
</script>
</body>
</html>
