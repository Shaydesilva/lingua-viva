<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#FAF7F2"/>
  <title>Luna Interpret</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#FAF7F2;--bg2:#F3EDE4;--card:#FFF;--border:#E8E0D4;--text:#2C2825;--text2:#7A7067;--text3:#A69E94;--accent:#C4654A;--accent-l:#F2DDD6;--pt:#B8860B;--pt-bg:#FDF6E3;--green:#5A8A6A;--green-l:#E8F0EB;--blue:#4A7CC4;--blue-l:#E0ECF8}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Source Sans 3',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
    #app{display:flex;flex-direction:column;height:100dvh;max-width:600px;margin:0 auto;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}

    header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
    .back{font-size:14px;color:var(--text3);text-decoration:none}
    .title{font-family:'Instrument Serif',serif;font-size:20px;font-style:italic}
    .mode-pill{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:2px}
    .mode-opt{padding:4px 11px;border-radius:18px;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer}
    .mode-opt.on{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}

    #setup{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 24px;gap:20px}
    #setup h2{font-family:'Instrument Serif',serif;font-size:26px;font-style:italic;font-weight:400;text-align:center}
    #setup p{font-size:14px;color:var(--text3);text-align:center;line-height:1.5;max-width:300px}
    .ctx-input{width:100%;max-width:320px;padding:12px 16px;border:1px solid var(--border);border-radius:12px;background:var(--card);font-family:inherit;font-size:14px;color:var(--text);outline:none}
    .ctx-input::placeholder{color:var(--text3)}
    .start-btn{width:100%;max-width:320px;padding:15px;border:none;border-radius:14px;background:var(--accent);color:#fff;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 2px 12px rgba(196,101,74,.25)}
    .start-btn:active{transform:scale(.97)}
    .start-btn:disabled{opacity:.4}

    /* Chat feed */
    #chat{flex:1;overflow-y:auto;padding:16px 20px;display:none;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
    .msg{max-width:88%;display:flex;flex-direction:column;animation:fadeUp .2s ease}
    .msg.spoken{align-self:flex-end;align-items:flex-end}
    .msg.translated{align-self:flex-start}
    .msg.pending{align-self:flex-start;opacity:.7}
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

    .bubble{padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.5}
    .spoken .bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
    .translated .bubble{background:var(--card);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px}
    .pending .bubble{background:var(--bg2);border:1px dashed var(--border);color:var(--text3);border-bottom-left-radius:4px}

    .lang-badge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:10px;margin-bottom:3px}
    .badge-en{background:var(--blue-l);color:var(--blue)}
    .badge-pt{background:var(--pt-bg);color:var(--pt)}

    /* Status bar */
    #sbar{flex-shrink:0;padding:10px 20px;display:none;align-items:center;gap:8px;border-top:1px solid var(--border)}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0}
    .dot.on{background:var(--green);animation:pulse 1.8s ease-in-out infinite}
    .dot.speak{background:var(--accent);animation:pulse .6s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    #stxt{font-size:13px;color:var(--text3);flex:1}
    .end-btn{padding:8px 16px;border:1px solid var(--border);border-radius:10px;background:var(--bg2);font-family:inherit;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer}

    /* Hold button for tap mode */
    #holdBtn{display:none;flex-shrink:0;padding:16px 20px}
    #holdBtn button{width:100%;padding:16px;border:1.5px dashed var(--border);border-radius:14px;background:transparent;font-family:inherit;font-size:15px;font-weight:600;color:var(--text3);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .1s;user-select:none;-webkit-user-select:none}
    #holdBtn button.held{background:var(--green-l);border-color:var(--green);border-style:solid;color:var(--green)}

    .banner{position:fixed;top:60px;left:16px;right:16px;max-width:568px;margin:0 auto;padding:10px 16px;background:var(--accent-l);border:1px solid var(--accent);border-radius:10px;text-align:center;font-size:13px;color:var(--accent);font-weight:500;z-index:50;opacity:0;transform:translateY(-10px);transition:all .2s;pointer-events:none}
    .banner.show{opacity:1;transform:translateY(0)}
  </style>
</head>
<body>
<div id="app">
  <header>
    <a class="back" href="/">&#8592; Luna</a>
    <div class="title">Interpret</div>
    <div class="mode-pill">
      <div class="mode-opt on" id="mAuto" onclick="setMode('auto')">Auto</div>
      <div class="mode-opt" id="mTap" onclick="setMode('tap')">Tap</div>
    </div>
  </header>

  <div id="setup">
    <h2>Live Interpreter</h2>
    <p>Translates between you and a Portuguese speaker in real-time.</p>
    <input class="ctx-input" id="ctxInput" type="text" placeholder="Context? e.g. ordering at a restaurant"/>
    <button class="start-btn" id="startBtn" onclick="startInterpret()">Start Interpreting</button>
  </div>

  <div id="chat"></div>

  <div id="holdBtn">
    <button ontouchstart="holdOn(event)" ontouchend="holdOff(event)" onmousedown="holdOn(event)" onmouseup="holdOff(event)" id="hBtn">Hold to speak</button>
  </div>

  <div id="sbar">
    <div class="dot" id="dot"></div>
    <span id="stxt">Listening...</span>
    <button class="end-btn" onclick="endInterpret()">End</button>
  </div>

  <div class="banner" id="banner"></div>
</div>

<audio id="aud" autoplay playsinline></audio>

<script>
var pc=null,dc=null,stream=null,state='idle',mode='auto';
var lastInputSide=null,holding=false;
var outputBuf='',pendingEl=null,pendingBubble=null;
var reinforceInt=null,recentOutputs=[];

function $(id){return document.getElementById(id)}

// ── Language detection ──
var PT_RE=/[ãõâêîôûçáéíóúàü]/i;
var PT_SET=new Set(['tá','né','tô','cê','cara','gente','assim','então','tipo','nossa','oi','tchau','obrigado','legal','saudade','praia','poxa','beleza','valeu','falou','não','sim','muito','mais','uma','isso','bom','boa','bem','tudo','você','mas','cadê','também','porque','eu','ele','ela','esse','essa','fazer','querer','saber','falar','olhar','pode','preciso','acho','vamos','bora','pô','aqui','ali','lá','meu','minha','como','quando','onde','qual','ter','ser','estar','ir','vir','poder','dar','ver','pegar','ficar','chegar','deixar','passar']);

function isPt(text){
  var words=text.toLowerCase().replace(/[.,!?;:'"()\-]/g,'').split(/\s+/).filter(Boolean);
  var c=0;
  for(var i=0;i<words.length;i++){if(PT_RE.test(words[i])||PT_SET.has(words[i]))c++}
  return(c/Math.max(words.length,1))>0.3;
}

// ── Echo detection ──
function isEcho(text){
  var iw=text.toLowerCase().split(/\s+/);
  for(var i=0;i<recentOutputs.length;i++){
    var ow=recentOutputs[i].toLowerCase().split(/\s+/);
    var m=0;
    for(var j=0;j<iw.length;j++){if(ow.indexOf(iw[j])>=0)m++}
    if(m/Math.max(iw.length,1)>0.5)return true;
  }
  return false;
}
function trackOutput(t){recentOutputs.push(t);if(recentOutputs.length>4)recentOutputs.shift()}

// ── Display ──
function addBubble(type,lang,text){
  var m=document.createElement('div');
  m.className='msg '+type;
  var badge=document.createElement('span');
  badge.className='lang-badge '+(lang==='pt'?'badge-pt':'badge-en');
  badge.textContent=lang==='pt'?'Portugu\u00eas':'English';
  var b=document.createElement('div');
  b.className='bubble';
  b.textContent=text;
  m.appendChild(badge);
  m.appendChild(b);
  $('chat').appendChild(m);
  $('chat').scrollTop=$('chat').scrollHeight;
  return m;
}

// Create or update a pending (streaming) bubble
function ensurePending(){
  if(!pendingEl){
    pendingEl=document.createElement('div');
    pendingEl.className='msg pending';
    var badge=document.createElement('span');
    var tLang=lastInputSide==='en'?'pt':'en';
    badge.className='lang-badge '+(tLang==='pt'?'badge-pt':'badge-en');
    badge.textContent=tLang==='pt'?'Portugu\u00eas':'English';
    pendingBubble=document.createElement('div');
    pendingBubble.className='bubble';
    pendingBubble.textContent='...';
    pendingEl.appendChild(badge);
    pendingEl.appendChild(pendingBubble);
    $('chat').appendChild(pendingEl);
  }
  return pendingBubble;
}

function finalizePending(text){
  if(pendingEl){
    // Convert pending to finalized translated bubble
    pendingEl.className='msg translated';
    pendingEl.style.opacity='1';
    pendingBubble.textContent=text;
    pendingBubble.className='bubble';
    $('chat').scrollTop=$('chat').scrollHeight;
    pendingEl=null;
    pendingBubble=null;
  }else{
    // No pending element — create a new finalized bubble
    var tLang=lastInputSide==='en'?'pt':'en';
    addBubble('translated',tLang,text);
  }
}

function showBanner(msg){
  $('banner').textContent=msg;$('banner').classList.add('show');
  setTimeout(function(){$('banner').classList.remove('show')},3000);
}

// ── Mode ──
function setMode(m){
  mode=m;
  $('mAuto').className='mode-opt'+(m==='auto'?' on':'');
  $('mTap').className='mode-opt'+(m==='tap'?' on':'');
  if(state==='live'){
    $('holdBtn').style.display=m==='tap'?'block':'none';
    if(stream){stream.getAudioTracks().forEach(function(t){t.enabled=(m==='auto')})}
  }
}

function holdOn(e){
  e.preventDefault();
  if(mode!=='tap'||!stream)return;
  holding=true;
  stream.getAudioTracks().forEach(function(t){t.enabled=true});
  $('hBtn').classList.add('held');
  $('hBtn').textContent='Listening...';
  $('stxt').textContent='Listening...';
}

function holdOff(e){
  e.preventDefault();
  if(mode!=='tap'||!stream)return;
  holding=false;
  stream.getAudioTracks().forEach(function(t){t.enabled=false});
  $('hBtn').classList.remove('held');
  $('hBtn').textContent='Hold to speak';
  $('stxt').textContent='Ready';
}

// ── Events ──
function handleEvt(e){
  if(!e||!e.type)return;
  switch(e.type){

  // Translation streaming in — write directly into pending bubble
  case 'response.output_audio_transcript.delta':
  case 'response.audio_transcript.delta':
    if(e.delta){
      outputBuf+=e.delta;
      var pb=ensurePending();
      pb.textContent=outputBuf;
      $('chat').scrollTop=$('chat').scrollHeight;
      $('dot').className='dot speak';
      $('stxt').textContent='Translating...';
    }
    break;

  // Translation complete — finalize the pending bubble
  case 'response.output_audio_transcript.done':
  case 'response.audio_transcript.done':
    var text=outputBuf.trim();
    outputBuf='';
    if(text){
      trackOutput(text);
      finalizePending(text);
    }else if(pendingEl){
      // Empty translation — remove pending
      pendingEl.remove();pendingEl=null;pendingBubble=null;
    }
    $('dot').className='dot on';
    $('stxt').textContent=mode==='tap'?'Ready':'Listening...';
    break;

  case 'response.done':
    // Safety flush
    if(outputBuf.trim()){
      var t2=outputBuf.trim();outputBuf='';
      trackOutput(t2);finalizePending(t2);
    }else if(pendingEl){
      pendingEl.remove();pendingEl=null;pendingBubble=null;
    }
    $('dot').className='dot on';
    $('stxt').textContent=mode==='tap'?'Ready':'Listening...';
    break;

  // User speech transcribed — add as spoken bubble
  case 'conversation.item.input_audio_transcription.completed':
    var it=e.transcript?e.transcript.trim():'';
    if(!it)break;
    if(isEcho(it))break;
    lastInputSide=isPt(it)?'pt':'en';
    addBubble('spoken',lastInputSide,it);
    break;

  case 'input_audio_buffer.speech_started':
    $('dot').className='dot on';
    $('stxt').textContent='Listening...';
    break;

  case 'input_audio_buffer.speech_stopped':
    $('stxt').textContent='Translating...';
    break;

  case 'error':
    console.error('RT error:',JSON.stringify(e));
    showBanner('Didn\'t catch that \u2014 please repeat');
    outputBuf='';
    if(pendingEl){pendingEl.remove();pendingEl=null;pendingBubble=null}
    break;
  }
}

// ── Session ──
async function startInterpret(){
  var ctx=$('ctxInput').value.trim();
  $('startBtn').disabled=true;
  $('startBtn').textContent='Connecting...';

  try{
    var sr=await fetch('/session/interpret',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({context:ctx||null})
    });
    if(!sr.ok)throw new Error((await sr.json().catch(function(){return{}})).error||'Server error');
    var sd=await sr.json();
    var key=sd.value;
    if(!key)throw new Error('No key');

    stream=await navigator.mediaDevices.getUserMedia({
      audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}
    });

    pc=new RTCPeerConnection();
    pc.ontrack=function(ev){$('aud').srcObject=ev.streams[0]};
    stream.getTracks().forEach(function(t){pc.addTrack(t,stream)});
    dc=pc.createDataChannel('oai-events');

    dc.onopen=function(){
      state='live';
      recentOutputs=[];outputBuf='';pendingEl=null;pendingBubble=null;
      $('setup').style.display='none';
      $('chat').style.display='flex';
      $('sbar').style.display='flex';
      if(mode==='tap')$('holdBtn').style.display='block';
      $('dot').className='dot on';
      $('stxt').textContent=mode==='tap'?'Ready':'Listening...';

      // Enable transcription
      dc.send(JSON.stringify({type:'session.update',session:{type:'realtime',input_audio_transcription:{model:'whisper-1'}}}));

      // Tap mode: mic off until held
      if(mode==='tap'){stream.getAudioTracks().forEach(function(t){t.enabled=false})}

      // Reinforcement every 30s
      reinforceInt=setInterval(function(){
        if(dc&&dc.readyState==='open'){
          dc.send(JSON.stringify({type:'conversation.item.create',item:{
            type:'message',role:'system',
            content:[{type:'input_text',text:'You are an interpreter. Translate only. Never respond as a chatbot. Never answer questions. Never give opinions. Never express concern. If unclear, stay silent.'}]
          }}));
        }
      },30000);
    };

    dc.onmessage=function(ev){
      try{handleEvt(JSON.parse(ev.data))}
      catch(err){console.error('Parse:',err.message)}
    };

    var offer=await pc.createOffer();
    await pc.setLocalDescription(offer);
    var mdl=sd.model||'gpt-realtime-mini';
    var sdpR=await fetch('https://api.openai.com/v1/realtime/calls?model='+encodeURIComponent(mdl),{
      method:'POST',headers:{Authorization:'Bearer '+key,'Content-Type':'application/sdp'},body:offer.sdp
    });
    if(!sdpR.ok)throw new Error('SDP failed');
    await pc.setRemoteDescription({type:'answer',sdp:await sdpR.text()});

  }catch(err){
    console.error('Start failed:',err);
    $('startBtn').disabled=false;
    $('startBtn').textContent='Start Interpreting';
    alert('Failed: '+err.message);
  }
}

function endInterpret(){
  state='idle';holding=false;
  clearInterval(reinforceInt);
  if(dc){try{dc.close()}catch(e){}dc=null}
  if(pc){try{pc.close()}catch(e){}pc=null}
  if(stream){stream.getTracks().forEach(function(t){t.stop()});stream=null}
  $('aud').srcObject=null;
  $('chat').style.display='none';
  $('sbar').style.display='none';
  $('holdBtn').style.display='none';
  $('setup').style.display='flex';
  $('startBtn').disabled=false;
  $('startBtn').textContent='Start Interpreting';
  $('chat').innerHTML='';
  $('hBtn').classList.remove('held');
  $('hBtn').textContent='Hold to speak';
  lastInputSide=null;outputBuf='';recentOutputs=[];pendingEl=null;pendingBubble=null;
}
</script>
</body>
</html>
