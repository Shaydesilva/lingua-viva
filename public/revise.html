<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#FAF7F2"/>
  <title>Luna Revise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#FAF7F2;--bg2:#F3EDE4;--card:#FFF;--border:#E8E0D4;--text:#2C2825;--text2:#7A7067;--text3:#A69E94;--accent:#C4654A;--accent-l:#F2DDD6;--pt:#B8860B;--pt-bg:#FDF6E3;--green:#5A8A6A;--green-l:#E8F0EB}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Source Sans 3',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
    #app{display:flex;flex-direction:column;height:100dvh;max-width:600px;margin:0 auto;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
    header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
    .back{font-size:14px;color:var(--text3);text-decoration:none}
    .title{font-family:'Instrument Serif',serif;font-size:20px;font-style:italic}
    .progress{font-size:12px;color:var(--text3);font-weight:600}

    #setup{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 24px;gap:20px}
    #setup h2{font-family:'Instrument Serif',serif;font-size:26px;font-style:italic;font-weight:400}
    #setup p{font-size:14px;color:var(--text3);text-align:center;line-height:1.5;max-width:300px}
    .start-btn{width:100%;max-width:320px;padding:15px;border:none;border-radius:14px;background:var(--green);color:#fff;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 2px 12px rgba(90,138,106,.25)}
    .start-btn:active{transform:scale(.97)}
    .start-btn:disabled{opacity:.4}
    .empty-msg{font-size:15px;color:var(--text2);text-align:center;line-height:1.5}
    .empty-msg a{color:var(--accent);text-decoration:none;font-weight:600}

    #chat{flex:1;overflow-y:auto;padding:16px 20px;display:none;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
    .msg{max-width:88%;display:flex;flex-direction:column;animation:fadeUp .2s ease}
    .msg.luna{align-self:flex-start}
    .msg.user{align-self:flex-end;align-items:flex-end}
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .bubble{padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.5}
    .luna .bubble{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px}
    .user .bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}

    #live{flex-shrink:0;min-height:30px;padding:6px 20px 4px;font-size:15px;line-height:1.5;color:var(--text3)}

    /* Self-assessment buttons */
    #assess{display:none;flex-shrink:0;padding:8px 20px 4px;text-align:center}
    #assess.show{display:block}
    .sa-word{font-size:13px;color:var(--pt);font-style:italic;margin-bottom:6px}
    .sa-btns{display:flex;gap:10px;justify-content:center}
    .sa-btn{padding:10px 24px;border-radius:12px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border:none;-webkit-tap-highlight-color:transparent}
    .sa-btn:active{transform:scale(.95)}
    .sa-got{background:var(--green-l);color:var(--green)}
    .sa-wip{background:#FFF3E0;color:#E6A817}

    #sbar{flex-shrink:0;padding:10px 20px;display:none;align-items:center;gap:8px;border-top:1px solid var(--border)}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0}
    .dot.on{background:var(--green);animation:pulse 1.8s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    #stxt{font-size:13px;color:var(--text3);flex:1}
    .end-btn{padding:8px 16px;border:1px solid var(--border);border-radius:10px;background:var(--bg2);font-family:inherit;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer}
  </style>
</head>
<body>
<div id="app">
  <header>
    <a class="back" href="/">&#8592; Home</a>
    <div class="title">Revise</div>
    <div class="progress" id="prog"></div>
  </header>

  <div id="setup">
    <h2>Vocabulary Review</h2>
    <p id="setupMsg">Loading...</p>
    <button class="start-btn" id="startBtn" onclick="startRevise()" style="display:none">Start Review</button>
  </div>

  <div id="chat"></div>
  <div id="live"></div>
  <div id="assess">
    <div class="sa-word" id="saWord"></div>
    <div class="sa-btns">
      <button class="sa-btn sa-got" onclick="assess(true)">&#10003; Got it</button>
      <button class="sa-btn sa-wip" onclick="assess(false)">&#9684; Working on it</button>
    </div>
  </div>

  <div id="sbar">
    <div class="dot" id="dot"></div>
    <span id="stxt">Listening...</span>
    <button class="end-btn" onclick="endRevise()">End</button>
  </div>
</div>

<audio id="aud" autoplay playsinline></audio>

<script>
var pc=null,dc=null,stream=null,state='idle';
var words=[],currentWordIdx=0;
var lunaT='',outputBuf='';
var assessTimeout=null;

function $(id){return document.getElementById(id)}

// ── Display ──
function addMsg(r,t){
  var m=document.createElement('div');m.className='msg '+r;
  var b=document.createElement('div');b.className='bubble';b.textContent=t;
  m.appendChild(b);$('chat').appendChild(m);$('chat').scrollTop=$('chat').scrollHeight;
}

function showAssess(word){
  $('saWord').textContent=word||'';
  $('assess').className='show';
  $('assess').style.display='block';
  clearTimeout(assessTimeout);
  assessTimeout=setTimeout(function(){hideAssess()},8000);
}

function hideAssess(){
  $('assess').style.display='none';
  clearTimeout(assessTimeout);
}

async function assess(confident){
  hideAssess();
  var word=words[currentWordIdx]?.word;
  if(!word)return;
  try{
    await fetch('/vocab/assess',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({word:word,confident:confident})
    });
  }catch(e){console.error(e)}
  currentWordIdx++;
  if(currentWordIdx<words.length){
    $('prog').textContent=(currentWordIdx+1)+' of '+words.length;
  }
}

// ── Events — same as main Luna ──
function handleEvt(e){
  if(!e||!e.type)return;
  switch(e.type){
  case 'response.output_audio_transcript.delta':
  case 'response.audio_transcript.delta':
    if(e.delta){outputBuf+=e.delta;$('live').textContent=outputBuf}
    break;
  case 'response.output_audio_transcript.done':
  case 'response.audio_transcript.done':
    var t=outputBuf.trim();outputBuf='';$('live').textContent='';
    if(t)addMsg('luna',t);
    $('dot').className='dot on';$('stxt').textContent='Listening...';
    break;
  case 'response.done':
    if(outputBuf.trim()){var t2=outputBuf.trim();outputBuf='';$('live').textContent='';addMsg('luna',t2)}
    $('dot').className='dot on';$('stxt').textContent='Listening...';
    break;
  case 'conversation.item.input_audio_transcription.completed':
    var it=e.transcript?e.transcript.trim():'';
    if(!it)break;
    addMsg('user',it);
    // Show self-assessment for current review word
    if(currentWordIdx<words.length){
      showAssess(words[currentWordIdx].word);
    }
    break;
  case 'input_audio_buffer.speech_started':
    $('dot').className='dot on';$('stxt').textContent='Listening...';
    hideAssess();
    break;
  case 'error':
    console.error('RT error:',JSON.stringify(e));
    break;
  }
}

// ── Setup ──
async function checkDue(){
  try{
    var r=await fetch('/vocab/due');
    var d=await r.json();
    if(!d||d.length===0){
      $('setupMsg').innerHTML='<div class="empty-msg">No words due for review right now.<br><a href="/index.html">Talk with Luna</a> to build vocabulary.</div>';
      return;
    }
    words=d;
    $('setupMsg').textContent=d.length+' word'+(d.length>1?'s':'')+' due for review';
    $('startBtn').style.display='block';
  }catch(e){
    $('setupMsg').textContent='Could not load vocabulary';
  }
}
checkDue();

// ── Session ──
async function startRevise(){
  $('startBtn').disabled=true;$('startBtn').textContent='Connecting...';
  currentWordIdx=0;

  try{
    var sr=await fetch('/session/revise',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
    if(!sr.ok)throw new Error((await sr.json().catch(function(){return{}})).error||'Server error');
    var sd=await sr.json();
    if(sd.empty){$('setupMsg').textContent='No words to review!';$('startBtn').disabled=false;$('startBtn').textContent='Start Review';return}
    var key=sd.value;
    if(!key)throw new Error('No key');
    if(sd.words)words=sd.words;

    stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}});

    pc=new RTCPeerConnection();
    pc.ontrack=function(ev){$('aud').srcObject=ev.streams[0]};
    stream.getTracks().forEach(function(t){pc.addTrack(t,stream)});
    dc=pc.createDataChannel('oai-events');

    dc.onopen=function(){
      state='live';outputBuf='';
      $('setup').style.display='none';
      $('chat').style.display='flex';
      $('sbar').style.display='flex';
      $('dot').className='dot on';
      $('stxt').textContent='Listening...';
      $('prog').textContent='1 of '+words.length;

      dc.send(JSON.stringify({type:'session.update',session:{type:'realtime',input_audio_transcription:{model:'whisper-1'}}}));
      setTimeout(function(){dc.send(JSON.stringify({type:'response.create'}))},400);
    };

    dc.onmessage=function(ev){
      try{handleEvt(JSON.parse(ev.data))}
      catch(err){console.error('Parse:',err.message)}
    };

    var offer=await pc.createOffer();
    await pc.setLocalDescription(offer);
    var mdl=sd.model||'gpt-realtime-mini';
    var sdpR=await fetch('https://api.openai.com/v1/realtime/calls?model='+encodeURIComponent(mdl),{
      method:'POST',headers:{Authorization:'Bearer '+key,'Content-Type':'application/sdp'},body:offer.sdp
    });
    if(!sdpR.ok)throw new Error('SDP failed');
    await pc.setRemoteDescription({type:'answer',sdp:await sdpR.text()});

  }catch(err){
    console.error('Start failed:',err);
    $('startBtn').disabled=false;$('startBtn').textContent='Start Review';
    alert('Failed: '+err.message);
  }
}

function endRevise(){
  state='idle';hideAssess();
  if(dc){try{dc.close()}catch(e){}dc=null}
  if(pc){try{pc.close()}catch(e){}pc=null}
  if(stream){stream.getTracks().forEach(function(t){t.stop()});stream=null}
  $('aud').srcObject=null;
  $('chat').style.display='none';$('sbar').style.display='none';$('assess').style.display='none';
  $('setup').style.display='flex';
  $('startBtn').disabled=false;$('startBtn').textContent='Start Review';
  $('chat').innerHTML='';$('prog').textContent='';
  outputBuf='';words=[];currentWordIdx=0;
  // Refresh due count
  checkDue();
}
</script>
</body>
</html>
